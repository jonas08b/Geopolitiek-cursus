<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geopolitiek & Internationale Betrekkingen — Leerplatform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
:root{
  --bg:#FFFFFF;
  --bg-sidebar:#FBFBFA;
  --bg-hover:#F1F1EF;
  --border:#E9E9E7;
  --text:#2E2C28;
  --text-muted:#8A8579;
  --accent:#1B3A5C;
  --accent-soft:#E8EEF3;
  --up:#2E7D5B;
  --up-soft:#E7F3EC;
  --down:#B23B3B;
  --down-soft:#FBEAEA;
  --amber:#9C7A2A;
  --amber-soft:#F6F0DF;
  --radius:6px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:var(--bg);
  font-size:15px;
  line-height:1.6;
}
h1,h2,h3,h4{font-family:'Source Serif 4',serif; font-weight:600; letter-spacing:-0.01em; margin:0;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}

.app{display:flex; min-height:100vh;}

.sidebar{
  width:280px; flex-shrink:0;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  padding:20px 12px 40px;
  position:sticky; top:0; height:100vh; overflow-y:auto;
}
.brand{padding:6px 10px 18px;}
.brand-mark{font-family:'Source Serif 4',serif; font-weight:700; font-size:17px; color:var(--accent);}
.brand-sub{font-size:11.5px; color:var(--text-muted); margin-top:2px; font-family:'JetBrains Mono',monospace; letter-spacing:0.02em;}

.level-group{margin-bottom:4px;}
.level-header{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 10px 5px; cursor:pointer; user-select:none;
}
.level-title{font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-muted); font-weight:600;}
.level-count{font-size:10.5px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}
.level-chevron{font-size:10px; color:var(--text-muted); transition:transform .15s;}
.level-group.collapsed .level-chevron{transform:rotate(-90deg);}
.level-group.collapsed .module-list{display:none;}

.module-item{
  display:flex; align-items:center; gap:9px;
  padding:6.5px 10px 6.5px 14px; border-radius:var(--radius);
  cursor:pointer; font-size:13.5px; color:var(--text);
}
.module-item:hover{background:var(--bg-hover);}
.module-item.active{background:var(--accent-soft); color:var(--accent); font-weight:600;}
.module-num{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-muted); width:20px; flex-shrink:0;}
.module-item.active .module-num{color:var(--accent);}
.module-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.module-item .lock{margin-left:auto; font-size:10px; color:var(--text-muted);}

.main{flex:1; min-width:0;}
.topbar{
  position:sticky; top:0; z-index:5; background:rgba(255,255,255,.92); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
  padding:14px 48px; display:flex; align-items:center; justify-content:space-between;
}
.crumb{font-size:12.5px; color:var(--text-muted);}
.crumb b{color:var(--text); font-weight:600;}
.progress-pill{font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent); background:var(--accent-soft); padding:4px 10px; border-radius:20px;}

.content{max-width:820px; margin:0 auto; padding:48px 48px 120px;}

.eyebrow{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--accent); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px;}
.module-title{font-size:32px; margin-bottom:10px;}
.module-dek{font-size:16px; color:var(--text-muted); margin-bottom:28px; max-width:640px;}

.dash-strip{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:1px; background:var(--border); border:1px solid var(--border); border-radius:8px;
  overflow:hidden; margin-bottom:36px;
}
.dash-card{background:#fff; padding:14px 16px;}
.dash-label{font-size:10.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:6px;}
.dash-value{font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:600;}
.dash-value.up{color:var(--up);}
.dash-value.down{color:var(--down);}
.dash-delta{font-family:'JetBrains Mono',monospace; font-size:11px; margin-top:3px;}
.dash-delta.up{color:var(--up);}
.dash-delta.down{color:var(--down);}

section.block{margin-bottom:36px;}
.block h3{font-size:20px; margin-bottom:14px; display:flex; align-items:center; gap:10px;}
.block h3 .tag{font-family:'JetBrains Mono',monospace; font-size:10.5px; background:var(--accent-soft); color:var(--accent); padding:3px 8px; border-radius:4px; font-weight:600;}
.block p{margin:0 0 14px;}
.block ul, .block ol{margin:0 0 14px; padding-left:22px;}
.block li{margin-bottom:6px;}

.callout{
  border:1px solid var(--border); border-left:3px solid var(--accent);
  background:var(--accent-soft); border-radius:0 8px 8px 0;
  padding:14px 18px; margin:16px 0; font-size:14px;
}
.callout.warn{border-left-color:var(--amber); background:var(--amber-soft);}
.callout.warn .callout-label{color:var(--amber);}
.callout-label{font-weight:700; font-size:11.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--accent); margin-bottom:5px; font-family:'JetBrains Mono',monospace;}

.steps{border:1px solid var(--border); border-radius:8px; overflow:hidden;}
.step{display:flex; gap:14px; padding:14px 18px; border-bottom:1px solid var(--border);}
.step:last-child{border-bottom:none;}
.step-num{font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--accent); font-size:13px; width:22px; flex-shrink:0;}
.step-body b{display:block; margin-bottom:2px; font-size:14px;}
.step-body span{color:var(--text-muted); font-size:13.5px;}

.case-card{border:1px solid var(--border); border-radius:8px; padding:18px 20px; margin-bottom:14px;}
.case-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;}
.case-title{font-weight:600; font-size:14.5px;}
.case-date{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--text-muted);}
.case-tickers{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
.ticker{font-family:'JetBrains Mono',monospace; font-size:11px; padding:3px 8px; border-radius:4px; background:var(--bg-hover); border:1px solid var(--border);}
.ticker.up{color:var(--up); border-color:var(--up-soft); background:var(--up-soft);}
.ticker.down{color:var(--down); border-color:var(--down-soft); background:var(--down-soft);}

.chart-wrap{border:1px solid var(--border); border-radius:8px; padding:18px 20px 8px; margin:16px 0;}
.chart-title{font-size:13px; font-weight:600; margin-bottom:2px;}
.chart-sub{font-size:11.5px; color:var(--text-muted); margin-bottom:12px; font-family:'JetBrains Mono',monospace;}
canvas{max-height:260px;}

table.datatab{width:100%; border-collapse:collapse; font-size:13px; margin:14px 0;}
table.datatab th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text-muted); border-bottom:1px solid var(--border); padding:8px 10px;}
table.datatab td{padding:9px 10px; border-bottom:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:12.5px;}

.quiz{border:1px solid var(--border); border-radius:8px; padding:4px;}
.quiz-q{padding:16px 18px 12px; border-bottom:1px solid var(--border);}
.quiz-q:last-child{border-bottom:none;}
.quiz-q p{font-weight:600; margin-bottom:10px; font-size:14px;}
.opt{
  display:block; width:100%; text-align:left; padding:9px 12px; margin-bottom:7px;
  border:1px solid var(--border); border-radius:6px; background:#fff; cursor:pointer; font-size:13.5px; font-family:inherit; color:var(--text);
}
.opt:hover{background:var(--bg-hover);}
.opt.correct{background:var(--up-soft); border-color:var(--up); color:var(--up);}
.opt.wrong{background:var(--down-soft); border-color:var(--down); color:var(--down);}

.sources{display:flex; flex-wrap:wrap; gap:8px;}
.source-chip{font-size:11.5px; padding:5px 10px; border:1px solid var(--border); border-radius:20px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}

.nav-footer{display:flex; justify-content:space-between; margin-top:52px; padding-top:24px; border-top:1px solid var(--border);}
.nav-btn{border:1px solid var(--border); border-radius:8px; padding:12px 16px; cursor:pointer; background:#fff; max-width:280px;}
.nav-btn:hover{background:var(--bg-hover);}
.nav-btn .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}
.nav-btn .ttl{font-size:13.5px; font-weight:600; margin-top:3px;}
.nav-btn.right{text-align:right; margin-left:auto;}

.stub{
  border:1px dashed var(--border); border-radius:8px; padding:40px 24px; text-align:center; color:var(--text-muted);
}
.stub b{color:var(--text); display:block; margin-bottom:6px; font-size:15px;}

/* SVG MAP */
.map-wrap{border:1px solid var(--border); border-radius:8px; padding:18px 20px; margin:16px 0; overflow:hidden;}
.map-legend{display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;}
.legend-item{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}
.legend-dot{width:10px; height:10px; border-radius:2px; flex-shrink:0;}

/* DASHBOARD */
.dash-btn{
  display:flex; align-items:center; gap:8px; margin:0 10px 14px; padding:9px 12px;
  border:1px solid var(--border); border-radius:var(--radius); background:#fff;
  cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text);
}
.dash-btn:hover{background:var(--bg-hover);}
.dash-btn.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.dash-btn .dot{width:7px; height:7px; border-radius:50%; background:var(--up); flex-shrink:0;}

.dash-content{max-width:1280px; margin:0 auto; padding:28px 32px 100px;}
.dash-header{display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;}
.dash-header h1{font-size:22px;}
.dash-header .sub{font-size:12px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}

.ticker-strip{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1px; background:var(--border); border:1px solid var(--border); border-radius:8px;
  overflow:hidden; margin-bottom:20px;
}
.ticker-item{background:#fff; padding:10px 14px;}
.ticker-label{font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:4px;}
.ticker-value{font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600;}
.ticker-delta{font-family:'JetBrains Mono',monospace; font-size:11px; margin-top:2px;}
.ticker-delta.up{color:var(--up);}
.ticker-delta.down{color:var(--down);}

.dash-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; margin-bottom:16px;}
.dash-panel{border:1px solid var(--border); border-radius:8px; background:#fff; padding:16px 18px;}
.dash-panel-title{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text); margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.dash-panel-title .unit{font-weight:500; color:var(--text-muted); text-transform:none; letter-spacing:0; font-family:'JetBrains Mono',monospace; font-size:10.5px;}
.dash-panel table{width:100%; border-collapse:collapse; font-size:12.5px;}
.dash-panel th{text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text-muted); border-bottom:1px solid var(--border); padding:6px 4px; font-weight:600;}
.dash-panel td{padding:7px 4px; border-bottom:1px solid var(--border); font-size:12.5px;}
.dash-panel tr:last-child td{border-bottom:none;}
.dash-panel .mono-cell{font-family:'JetBrains Mono',monospace; font-size:12px;}
.dash-updated{font-size:10.5px; color:var(--text-muted); font-family:'JetBrains Mono',monospace; margin-top:10px;}

.trend-dot{display:inline-block; width:8px; height:8px; border-radius:50%;}
.trend-dot.up{background:var(--up);}
.trend-dot.down{background:var(--down);}
.trend-dot.flat{background:var(--amber);}
.trend-arrow{font-size:12px; font-weight:700;}
.trend-arrow.up{color:var(--up);}
.trend-arrow.down{color:var(--down);}
.trend-arrow.flat{color:var(--amber);}

.heatmap-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:8px;}
.heatmap-tile{border-radius:6px; padding:12px 10px; color:#fff;}
.heatmap-tile .t-name{font-size:12px; font-weight:600;}
.heatmap-tile .t-val{font-family:'JetBrains Mono',monospace; font-size:13px; margin-top:4px;}

.score-row{display:flex; align-items:center; gap:10px; margin-bottom:10px;}
.score-label{width:90px; font-size:12.5px; color:var(--text-muted); flex-shrink:0;}
.score-bar{display:flex; gap:2px; flex:1;}
.score-seg{height:9px; flex:1; border-radius:2px; background:var(--bg-hover);}
.score-seg.on-g{background:var(--up);}
.score-seg.on-a{background:var(--amber);}
.score-seg.on-r{background:var(--down);}
.score-val{width:36px; text-align:right; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; flex-shrink:0;}
.score-total{display:flex; align-items:baseline; justify-content:space-between; margin-top:14px; padding-top:14px; border-top:1px solid var(--border);}
.score-total .lbl{font-size:12.5px; font-weight:600;}
.score-total .val{font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--accent);}
.score-total .regime{font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono',monospace;}

.pos-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px;}
.pos-row b{font-weight:600;}
.calendar-impact{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:2px;}
.calendar-impact.high{background:var(--down);}
.calendar-impact.med{background:var(--amber);}

@media (max-width:860px){
  .sidebar{position:fixed; left:-280px; z-index:20; transition:left .2s; box-shadow:0 0 0 9999px rgba(0,0,0,0);}
  .sidebar.open{left:0; box-shadow:0 0 40px rgba(0,0,0,.15);}
  .content{padding:32px 20px 100px;}
  .topbar{padding:12px 16px;}
  .menu-btn{display:inline-block !important;}
}
.menu-btn{display:none; border:1px solid var(--border); background:#fff; border-radius:6px; padding:6px 10px; cursor:pointer; font-size:13px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="crumb" id="crumb"></div>
      </div>
      <div class="progress-pill" id="progressPill"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
/* ======================= DATA MODEL ======================= */
const LEVELS = [
  {id:'beginner', title:'Beginner', range:[1,10]},
  {id:'gevorderd', title:'Gevorderd', range:[11,20]},
  {id:'expert', title:'Expert', range:[21,30]},
  {id:'master', title:'Professional / Institutioneel', range:null},
  {id:'casestudies', title:'Case Studies — Historische Crises', range:null}
];

const MODULE_LIST = [
  {n:1,  title:'Inleiding tot geopolitiek',                   level:'beginner'},
  {n:2,  title:'Machtsevenwicht en statensysteem',             level:'beginner'},
  {n:3,  title:'Oorlog, conflict en veiligheid',               level:'beginner'},

  {n:6,  title:'Grondstoffen en kritieke mineralen',           level:'beginner'},
  {n:7,  title:'Handelsroutes en zeestraten',                  level:'beginner'},
  {n:8,  title:'NAVO en collectieve veiligheid',               level:'beginner'},
  {n:9,  title:'De Europese Unie als geopolitieke actor',      level:'beginner'},
  {n:10, title:'China en de Indo-Pacifieke regio',             level:'beginner'},
  {n:11, title:'Rusland: strategie en invloed',                level:'gevorderd'},
  {n:12, title:'Het Midden-Oosten: olie, macht en conflict',   level:'gevorderd'},

  {n:18, title:'Valuta-oorlogen en financiële geopolitiek',    level:'gevorderd'},
  {n:19, title:'Cyber en informatieoorlogvoering',             level:'gevorderd'},
  {n:20, title:'Nucleaire afschrikking en proliferatie',       level:'gevorderd'},

  {n:28, title:'Politieke risico-modellen en -methodologie',   level:'expert'},
  {n:29, title:'Geopolitieke psychologie en leiderschap',      level:'expert'},
  {n:30, title:'Internationale instellingen: IMF, WTO, VN',   level:'expert'},
  {n:31, title:'Kwantitatieve geopolitieke modellen',          level:'master'},
  {n:32, title:'Nowcasting van conflicten en crises',          level:'master'},
  {n:33, title:'Bayesian risico-inschatting in geopolitiek',   level:'master'},
  {n:34, title:'Portefeuilleconstructie onder geopolitiek risico', level:'master'},
  {n:35, title:'Stress testing voor geopolitieke schokken',    level:'master'},
  {n:36, title:'Arctische en ruimtelijke geopolitiek',         level:'expert'},
  {n:37, title:'Humanitaire interventie en internationaal recht', level:'expert'},
  {n:38, title:'Propaganda, desinformatie en soft power',      level:'expert'},
  {n:39, title:'Case Study: Oekraïne (2022–heden)',            level:'casestudies'},
  {n:40, title:'Case Study: Taiwan-straat en de chipoorlog',   level:'casestudies'},
  {n:41, title:'Case Study: Suezkanaalcrisis en Rode Zee',     level:'casestudies'},
  {n:42, title:'Case Study: BRICS-uitbreiding en de nieuwe wereldorde', level:'casestudies'},
];

const BUILT = {1:true,2:true,3:true,4:true,5:true,6:true,7:true,8:true,9:true,10:true,11:true,12:true,13:true,14:true,15:true,16:true,17:true,18:true,19:true,20:true,21:true,22:true,23:true,24:true,25:true,26:true,27:true,28:true,29:true,30:true,31:true,32:true,33:true,34:true,35:true,36:true,37:true,38:true,39:true,40:true,41:true,42:true};

/* ---- Historical data (public datasets / well-known approximations) ---- */
const BRENT_OIL = {
  labels:['2018','2019','2020','2021','2022 Q1','2022 Q3','2023','2024','2025','2026'],
  values:[72,64,42,71,100,94,82,80,72,78]
};
const TTF_GAS = {
  labels:['2019','2020','2021','2022 Q1','2022 Q3','2022 Q4','2023','2024','2025','2026'],
  values:[14,9,26,75,200,145,50,38,42,46]
};
const BALTIC_DRY = {
  labels:['2018','2019','2020','2021','2022','2023','2024','2025','2026'],
  values:[1350,1340,1500,2950,1900,1450,1800,1750,1600]
};
const NATO_SPENDING = { // % of GDP, NATO average
  labels:['2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025'],
  values:[1.40,1.42,1.46,1.53,1.60,1.68,1.72,1.77,1.90,2.07,2.20,2.35]
};
const GLOBAL_CONFLICT = { // ACLED conflict events (thousands), approximate
  labels:['2016','2017','2018','2019','2020','2021','2022','2023','2024','2025'],
  values:[52,61,68,70,75,87,110,128,135,140]
};
const DEFENCE_SPENDING_WORLD = { // World military spending $ trillion (SIPRI)
  labels:['2014','2015','2016','2017','2018','2019','2020','2021','2022','2023','2024','2025'],
  values:[1.65,1.68,1.71,1.74,1.78,1.83,1.98,2.11,2.24,2.44,2.61,2.77]
};

function makeLineChart(canvasId, data, opts={}){
  const ctx = document.getElementById(canvasId);
  if(!ctx) return;
  const chart = new Chart(ctx.getContext('2d'), {
    type:'line',
    data:{
      labels:data.labels,
      datasets:[{
        data:data.values,
        borderColor: opts.color || '#1B3A5C',
        backgroundColor: (opts.color||'#1B3A5C')+'1A',
        borderWidth:2,
        pointRadius:2.5,
        pointBackgroundColor: opts.color || '#1B3A5C',
        tension:0.35,
        fill:true,
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false}, tooltip:{callbacks:{label:(c)=> (opts.suffix? c.parsed.y+opts.suffix : c.parsed.y)}}},
      scales:{
        y:{ grid:{color:'#F1F1EF'}, ticks:{font:{family:'JetBrains Mono', size:10.5}, callback:(v)=> v+(opts.suffix||'')} },
        x:{ grid:{display:false}, ticks:{font:{family:'JetBrains Mono', size:10}} }
      }
    }
  });
  chartRegistry.push(chart);
}

function renderDashStrip(cards){
  return `<div class="dash-strip">${cards.map(c=>`
    <div class="dash-card">
      <div class="dash-label">${c.label}</div>
      <div class="dash-value ${c.dir||''}">${c.value}</div>
      <div class="dash-delta ${c.dir||''}">${c.delta}</div>
    </div>`).join('')}</div>`;
}

function quiz(id, questions){
  let html = `<div class="quiz" id="${id}">`;
  questions.forEach((q,qi)=>{
    html += `<div class="quiz-q"><p>${qi+1}. ${q.q}</p>`;
    q.opts.forEach((o,oi)=>{
      html += `<button class="opt" onclick="answerQuiz('${id}',${qi},${oi},${q.correct})">${o}</button>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}
function answerQuiz(id, qi, oi, correct){
  const qBlock = document.querySelectorAll(`#${id} .quiz-q`)[qi];
  const opts = qBlock.querySelectorAll('.opt');
  opts.forEach((o,i)=>{
    o.disabled = true;
    if(i===correct) o.classList.add('correct');
    else if(i===oi) o.classList.add('wrong');
  });
}
window.answerQuiz = answerQuiz;

  <section class="block">
    <h3>Wat is geopolitiek? <span class="tag">theorie</span></h3>
    <p>Geopolitiek is de studie van hoe geografische factoren — ligging, grondstoffen, klimaat, zeeroutes, bevolkingsdichtheid — de buitenlandse politiek, militaire strategie en economische macht van staten beïnvloeden. De term werd geïntroduceerd door de Zweedse politicoloog Rudolf Kjellén in 1899 en vervolgens systematisch uitgewerkt door de Britse geograaf Halford Mackinder.</p>
    <p>Moderne geopolitiek combineert klassieke geografische determinanten met economie, technologie, demografie en informatie. Denk aan:</p>
    <ul>
      <li><b>Klassieke geopolitiek:</b> wie controleert de "Heartland" (Centraal-Eurazië) of de "Rimland" (kustregio's) controleert de wereld (Mackinder/Spykman).</li>
      <li><b>Economische geopolitiek:</b> handelsstromen, sancties, valuta-dominantie en supply chain controle als machtsinstrumenten.</li>
      <li><b>Technologische geopolitiek:</b> halfgeleiders, AI, cyberwapens en satellietnetwerken als strategische activa.</li>
      <li><b>Energiegeopolitiek:</b> olie, gas en kritieke mineralen als hefboom in interstate relaties.</li>
    </ul>
    <div class="callout"><div class="callout-label">Kernpunt</div>Geopolitiek is geen abstracte academische discipline. Olieprijzen, aandelenmarkten, valutakoersen en supply chains worden direct beïnvloed door geopolitieke ontwikkelingen. Een analist die geopolitiek negeert, mist structurele risico's.</div>

  <section class="block">
    <h3>De drie paradigma's in de internationale betrekkingen <span class="tag">theorie</span></h3>
    <table class="datatab">
      <tr><th>Paradigma</th><th>Kernidee</th><th>Hoofddenkers</th><th>Implicatie voor beleid</th></tr>
      <tr><td>Realisme</td><td>Staten handelen rationeel in eigen belang; macht en veiligheid staan centraal</td><td>Thucydides, Machiavelli, Morgenthau, Waltz, Mearsheimer</td><td>Balans van macht, allianties, afschrikking</td></tr>
      <tr><td>Liberalisme</td><td>Internationale samenwerking, handel en instituties verminderen conflict</td><td>Kant, Wilson, Keohane, Nye</td><td>Multilateralisme, WTO, EU, VN</td></tr>
      <tr><td>Constructivisme</td><td>Identiteit, normen en perceptie vormen belangen en gedrag van staten</td><td>Wendt, Finnemore, Checkel</td><td>Soft power, diplomatieke framing, normenvorming</td></tr>

  <section class="block">
    <h3>Waarom nu? De terugkeer van geopolitiek <span class="tag">historische achtergrond</span></h3>
    <p>Na de val van de Berlijnse Muur in 1989 leek de liberale wereldorde triomfantelijk. Francis Fukuyama sprak van "het einde van de geschiedenis". Globalisering, vrije handel en democratisering zouden conflicten overbodig maken. Dit optimisme bleek misplaatst:</p>
    <div class="steps">

      <div class="step"><div class="step-num">02</div><div class="step-body"><b>2014: Rusland annexeert de Krim</b><span>Voor het eerst sinds 1945 annexeerde een Europese grootmacht grondgebied van een buurstaat. Internationale sanctieregimes werden geactiveerd.</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>2016–2020: technologische decoupling</b><span>De handelsoorlog tussen de VS en China leidde tot exportcontroles op halfgeleiders en strategische technologie; de geopolitisering van supply chains begon.</span></div></div>
      <div class="step"><div class="step-num">04</div><div class="step-body"><b>2022: Russische invasie van Oekraïne</b><span>Grootste gewapend conflict in Europa sinds 1945; energie, voedsel en financiële markten werden direct geraakt; NAVO-uitgaven stegen scherp.</span></div></div>
      <div class="step"><div class="step-num">05</div><div class="step-body"><b>2023–heden: multipolaire fragmentatie</b><span>BRICS-uitbreiding, de-dollarisatie-retoriek, Rode Zee-aanvallen, Taiwan-spanning — de wereld beweegt naar een multipolaire orde.</span></div></div>
    </div>
  </section>

  <section class="block">
    <h3>Geopolitiek risico: definitie voor analisten <span class="tag">framework</span></h3>
    <p>Geopolitiek risico is het risico dat politieke en militaire ontwikkelingen tussen staten de economische waarde van activa, handelsrelaties of productieketens verstoren. Het bestaat uit drie componenten:</p>
    <ul>
      <li><b>Conflictrisico:</b> directe militaire confrontatie of terrorisme.</li>
      <li><b>Beleidsrisico:</b> sancties, exportcontroles, nationalisaties, tarieven.</li>

    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Geopolitiek risico ≠ oorlogsrisico. De meeste geopolitieke verliezen voor beleggers komen niet van directe conflicten, maar van beleidswijzigingen: sancties, exportverboden, onteigeningen en verstoorde handelsroutes.</div>

  <section class="block">

    <div class="steps">

  <section class="block">
    <h3>Het statensysteem en de Vrede van Westfalen (1648) <span class="tag">historische achtergrond</span></h3>
    <p>Het moderne internationale systeem is gebaseerd op het <b>Westfaalse principe</b>: soevereine staten zijn de primaire actoren in de internationale politiek, elk met exclusief gezag over hun eigen grondgebied. Dit systeem ontstond na de Dertigjarige Oorlog (1618–1648) en de Vrede van Westfalen. Het impliceert dat er geen supranationale autoriteit is — het internationale systeem is fundamenteel <b>anarchistisch</b> in de zin dat er geen wereldregering bestaat.</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>In een anarchistisch systeem moeten staten hun eigen veiligheid garanderen — wat leidt tot het "veiligheidsdilemma": wanneer staat A bewapent voor defensieve doeleinden, voelt staat B zich bedreigd en bewapent ook. Dit is de motor achter wapenraces.</div>
  </section>

  <section class="block">
    <h3>Machtsevenwicht: de centrale dynamiek <span class="tag">theorie</span></h3>
    <p>Het <b>machtsevenwicht</b> (balance of power) is het principe dat staten allianties vormen om te voorkomen dat één actor dominant wordt. Wanneer een potentiële hegemon opkomt, zullen andere staten — zelfs vroegere vijanden — samenwerken om die macht in te dammen. Dit wordt "externe balancering" (allianties sluiten) of "interne balancering" (zelf bewapenen) genoemd.</p>
    <table class="datatab">
      <tr><th>Historisch voorbeeld</th><th>Opkomende macht</th><th>Tegenwicht gevormd door</th><th>Resultaat</th></tr>
      <tr><td>Napoleontische oorlogen 1803–1815</td><td>Frankrijk</td><td>Pruisen, Oostenrijk, Rusland, VK</td><td>Congres van Wenen (1815), nieuw evenwicht</td></tr>
      <tr><td>Eerste Wereldoorlog 1914–1918</td><td>Duitsland/Oostenrijk</td><td>Entente (VK, FR, RU, later VS)</td><td>Versailles, instabiel naoorlogs systeem</td></tr>
      <tr><td>Koude Oorlog 1947–1991</td><td>Sovjet-Unie</td><td>NAVO, VS, westerse alliantie</td><td>Uiteenvallen USSR 1991</td></tr>
      <tr><td>Huidige situatie 2020–heden</td><td>China</td><td>QUAD, AUKUS, VS–Japan–Korea</td><td>Lopend, spanningen in de Indo-Pacifiek</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Wereld militaire uitgaven <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">Wereldwijde militaire uitgaven, $biljard (SIPRI)</div>
      <div class="chart-sub">2014–2025 · publieke SIPRI-data, benaderend</div>
      <canvas id="chartDefWorld"></canvas>
    </div>
    <div class="case-card">
      <div class="case-head"><span class="case-title">Historisch hoog: $2,77 biljard in 2025</span><span class="case-date">SIPRI 2025</span></div>
      <p>Wereldwijde defensie-uitgaven bereikten in 2025 een historisch record van circa $2,77 biljard. De stijging wordt aangedreven door de Oekraïne-oorlog (NAVO-leden verhoogden budgetten), het Chinese moderniseringsprogramma en verhoogde uitgaven in het Midden-Oosten en Azië-Pacific. Dit is de langste aaneengesloten periode van stijgende defensie-uitgaven sinds de Koude Oorlog.</p>
      <div class="case-tickers">
        <span class="ticker up">Rheinmetall +400%+ (2022–2025)</span>
        <span class="ticker up">BAE Systems +120%+</span>
        <span class="ticker up">Leonardo, Thales, Airbus Defence: sterk</span>
      </div>
    </div>
  </section>

  <section class="block">
    <h3>De Thucydides-val <span class="tag">theorie</span></h3>
    <p>De politicoloog Graham Allison analyseerde 16 historische gevallen van opkomende machtswisselingen. In 12 van de 16 gevallen eindigde de transitie in oorlog — een patroon dat hij de <b>"Thucydides-val"</b> noemde, naar de Griekse historicus die schreef over de onvermijdelijkheid van conflict tussen het opkomende Athene en het dominante Sparta. De huidige VS-China rivaliteit vertoont klassieke tekenen van deze dynamiek.</p>
    <div class="callout warn"><div class="callout-label">Denkfout</div>De Thucydides-val is geen ijzeren wet. In 4 van de 16 door Allison onderzochte gevallen werd de transitie vreedzaam opgelost. Institutionele inbedding, economische onderlinge afhankelijkheid en nucleaire afschrikking kunnen oorlog voorkomen — maar ze bieden geen garantie.</div>
  </section>

  <section class="block">
    <h3>NAVO-defensie-uitgaven als percentage van BBP <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">NAVO gemiddelde defensie-uitgaven, % van BBP</div>
      <div class="chart-sub">2014–2025 · NAVO-data, benaderend</div>
      <canvas id="chartNATO2"></canvas>
    </div>
    <p>Na jaren onder het NAVO-doel van 2% BBP is het bondgenootschapsgemiddelde na 2022 sterk gestegen. In 2024 bereikten voor het eerst 23 van de 32 leden het 2%-doel. Polen, de Baltische staten en Griekenland zitten ver boven de norm.</p>
  </section>

  <section class="block">
    <h3>Unipolair, bipolair of multipolair? <span class="tag">theorie</span></h3>
    <p>Het internationale systeem kent drie fundamentele structuren:</p>
    <ul>
      <li><b>Unipolaire orde (1991–±2010):</b> één dominante macht (VS) bepaalt de spelregels. Relatief stabiel, weinig grootmachtconflict.</li>
      <li><b>Bipolaire orde (Koude Oorlog 1947–1991):</b> twee supermachten in machtsevenwicht. Stabiel door nucleaire afschrikking, maar proxy-oorlogen aan de periferie.</li>
      <li><b>Multipolaire orde (heden):</b> meerdere machtscentra (VS, China, EU, Rusland, India, ASEAN). Theoretisch instabiel door complexe alliantievorming en onzekerheid over reacties.</li>
    </ul>
    <div class="callout"><div class="callout-label">Implicatie voor analisten</div>Multipolaire transities gaan historisch gepaard met verhoogde volatiliteit in grondstoffenprijzen, wisselkoersen en aandelenmarkten. Scenario-analyse (Module 22) wordt daarmee een kerncompetentie.</div>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>SIPRI Military Expenditure Database — jaarlijkse cijfers per land.</li>
      <li>NAVO burden-sharing rapport — officieel %-BBP per bondgenoot.</li>
      <li>Diplomatieke signalen: alliantievorming, verdragsopzegging, ambassadeurs-oproepingen.</li>
      <li>Wapenexportcijfers (SIPRI Arms Transfers Database) — wie levert aan wie?</li>
      <li>Nucleaire paraatheid: NEW START-naleving, JCPOA-status, proliferatiesignalen.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">SIPRI — sipri.org</span>
      <span class="source-chip">NAVO — nato.int/cps/en/natohq/topics_49198.htm</span>
      <span class="source-chip">Graham Allison — Destined for War (2017)</span>
      <span class="source-chip">IISS — iiss.org</span>
      <span class="source-chip">Correlates of War Project</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz2',[
      {q:'Wat wordt bedoeld met "balancering" in de geopolitieke theorie?', opts:['Het in evenwicht houden van de staatsschuld','Staten vormen allianties of bewapenen zichzelf om een potentiële hegemon in te dammen','De balans tussen importeren en exporteren','Het in evenwicht houden van interne politieke krachten'], correct:1},
      {q:'Wat is de "Thucydides-val"?', opts:['Een militaire strategie uit de oudheid','Het patroon waarbij opkomende machten en gevestigde machten historisch vaak in conflict komen','Een economische theorie over handelstekorten','Een onderhandelingsmodel voor vredesverdragen'], correct:1},
      {q:'Welke structuur heeft het huidige internationale systeem (2025)?', opts:['Stabiele unipolaire orde onder VS-hegemonie','Bipolaire orde VS vs Rusland','Fragmenterende multipolaire orde met VS, China, EU, India als polen','Anarchie zonder enige structuur'], correct:2},
    ])}
  </section>
  `;
}

function renderModule3(){
  return `
  <div class="eyebrow">Module 03 · Beginner</div>
  <h1 class="module-title">Oorlog, conflict en veiligheid</h1>
  <p class="module-dek">De anatomie van moderne gewapende conflicten: van conventionele oorlogsvoering tot hybride dreigingen, proxy-oorlogen en het grijze gebied tussen vrede en oorlog.</p>

  ${renderDashStrip([
    {label:'Actieve conflicten (2025)', value:'55+', delta:'UCDP/ACLED definitie', dir:'down'},
    {label:'Slachtoffers Oekraïne (mil.)', value:'600K+', delta:'schattingen 2022–2025', dir:'down'},
    {label:'Ontheemde bevolking (VN)', value:'120M+', delta:'▲ record 2024', dir:'down'},
    {label:'Hybride incidenten (EU)', value:'740+', delta:'sabotage, cyber 2024', dir:'down'},
  ])}

  <section class="block">
    <h3>Clausewitz en de aard van oorlog <span class="tag">theorie</span></h3>
    <p>De Pruisische generaal Carl von Clausewitz (1780–1831) definieerde oorlog als "de voortzetting van politiek met andere middelen." Dit kernprincipe blijft het fundament van moderne strategische theorie: oorlog is geen doel op zichzelf, maar een instrument ter bereiking van politieke doelstellingen. De zogenaamde "Clausewitzse driehoek" bestaat uit volk (emotie, patriottisme), leger (professionele uitvoering) en politiek leiderschap (strategische sturing).</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>Een analist die een conflict analyseert, begint niet met militaire tactiek maar met de politieke doelstellingen van de strijdende partijen. Wat probeert elke actor te bereiken? Wanneer is de kostenbatenafweging dusdanig dat een actor stopt met vechten?</div>
  </section>

  <section class="block">
    <h3>Typologieën van moderne conflicten <span class="tag">theorie</span></h3>
    <table class="datatab">
      <tr><th>Type conflict</th><th>Kenmerken</th><th>Recente voorbeelden</th><th>Economische impact</th></tr>
      <tr><td>Conventionele oorlog</td><td>Staten vs staten, geüniformeerde strijdkrachten, frontlinies</td><td>Oekraïne (2022–heden)</td><td>Energieprijzen, graan, defensie-industrie</td></tr>
      <tr><td>Burgeroorlog</td><td>Intrastatelijk, factiestrijd, staatsontbinding</td><td>Syrië, Sudan, Jemen</td><td>Vluchtelingenstromen, humanitaire hulp, regionale instabiliteit</td></tr>
      <tr><td>Proxy-oorlog</td><td>Grootmachten ondersteunen tegenstanders indirect</td><td>Jemen (SA vs Iran), Syrië (VS vs RU)</td><td>Wapens, olie, regionale allianties</td></tr>
      <tr><td>Hybride oorlog</td><td>Combinatie van cyber, desinformatie, irreguliere troepen, economische druk</td><td>Rusland in Oekraïne 2014, Baltische staten</td><td>Moeilijk te kwantificeren; onderbelicht risico</td></tr>
      <tr><td>Terrorisme</td><td>Niet-staatlijk geweld gericht op burgerdoelen</td><td>ISIS, Al-Qaeda, HAMAS-aanval 7 okt 2023</td><td>Toerisme, verzekering, veiligheidsuitgaven</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Hybride oorlogsvoering <span class="tag">theorie</span></h3>
    <p>Hybride oorlogsvoering combineert reguliere en irreguliere methoden: cyberaanvallen op kritieke infrastructuur, desinformatiecampagnes, inzet van huurlingen (bijv. Wagner Group), economische dwang, energiediplomatie en politieke beïnvloeding. Rusland heeft dit model geperfectioneerd; China hanteert een vergelijkbare benadering via economische afhankelijkheid en "grey zone"-activiteiten in de Zuid-Chinese Zee.</p>
    <div class="callout warn"><div class="callout-label">Grijze zone</div>Het gevaarlijkste kenmerk van hybride conflicten is dat ze plaatsvinden in een "grijze zone" tussen vrede en oorlog. Een conventionele militaire reactie is politiek moeilijk te rechtvaardigen, terwijl niet-reageren de agressie normaliseert. Dit creëert een strategisch dilemma voor democratische staten.</div>
  </section>

  <section class="block">
    <h3>De Oekraïne-oorlog: economische schokken <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">Oekraïense BBP-groei, % YoY</div>
      <div class="chart-sub">2018–2025 · IMF/Wereldbank benaderend</div>
      <canvas id="chartUkraineGDP"></canvas>
    </div>
    <div class="case-card">
      <div class="case-head"><span class="case-title">Economische ravage door conventionele oorlog</span><span class="case-date">2022–heden</span></div>
      <p>De Russische invasie van Oekraïne op 24 februari 2022 leidde tot een bbp-krimp van circa 29% in 2022 — de zwaarste economische schok in vredestijd voor een Europees land. De impact verspreidde zich mondiaal via energie (TTF-gas +900% piek), graan (tarwe +80%), en fertilisers. Rusland verloor direct toegang tot westerse financiële markten door SWIFT-uitsluiting en activabevriezing.</p>
      <div class="case-tickers">
        <span class="ticker down">TTF Gas: €12 → €340/MWh (piek aug 2022)</span>
        <span class="ticker down">Tarwe: $250 → $440/ton (piek mrt 2022)</span>
        <span class="ticker up">Rheinmetall: +500% (2022–2025)</span>
        <span class="ticker down">Russische roebel: −50% aanvankelijk</span>
      </div>
    </div>
  </section>

  <section class="block">
    <h3>Escalatieladder <span class="tag">framework</span></h3>
    <p>Herman Kahn's escalatieladder (1965) is nog steeds het standaardframework: een hiërarchie van 44 escalatieniveaus van diplomatieke spanning tot nucleaire vernietiging. Voor analisten zijn de praktisch relevante stappen:</p>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Diplomatieke spanning</b><span>Verbale dreigementen, ambassadeurs-oproepingen, grensincidenten. Marktimpact: beperkt en tijdelijk.</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Economische dwang</b><span>Sancties, tarieven, exportverboden, energiechantage. Marktimpact: sectorspecifiek, deels langdurig.</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Proxy-conflict en hybride acties</b><span>Cyberaanvallen, steun aan rebellen, sabotage. Marktimpact: verhoogde volatiliteit, verzekeringspremies.</span></div></div>
      <div class="step"><div class="step-num">04</div><div class="step-body"><b>Conventionele militaire operaties</b><span>Directe confrontatie. Marktimpact: aanzienlijk, afhankelijk van regio en grondstoffen.</span></div></div>
      <div class="step"><div class="step-num">05</div><div class="step-body"><b>Nucleaire dreiging / inzet</b><span>Existentieel risico. Theoretisch scenario met totale marktdisruptie; afschrikking hield het sinds 1945 op papier.</span></div></div>
    </div>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>ACLED / UCDP: real-time conflict tracking per land en regio.</li>
      <li>VN OCHA: humanitaire situatierapporten; ontheemden als indicator voor conflictintensiteit.</li>
      <li>Olieprijspremie bij Straat van Hormuz-dreiging (Midden-Oosten-conflicten).</li>
      <li>Graanprijzen en fertiliserprijzen bij Oost-Europese/Zwarte Zee-spanningen.</li>
      <li>Defensie-orderboeken (backlog): leading indicator voor aanhoudende conflictdruk.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">ACLED — acleddata.com</span>
      <span class="source-chip">UCDP — ucdp.uu.se</span>
      <span class="source-chip">OCHA — unocha.org</span>
      <span class="source-chip">Clausewitz — Vom Kriege (1832)</span>
      <span class="source-chip">IISS Armed Conflict Survey</span>
    </div>
  </section>

    <h3>Kennistoets</h3>
    ${quiz('quiz3',[
      {q:'Wat is de kern van Clausewitz\' definitie van oorlog?', opts:['Oorlog is een onontkoombaar gevolg van menselijke agressie','Oorlog is de voortzetting van politiek met andere middelen','Oorlog is altijd economisch gemotiveerd','Oorlog is een moreel falen van de diplomatiek'], correct:1},
      {q:'Wat kenmerkt hybride oorlogsvoering?', opts:['Exclusief gebruik van nucleaire wapens','Combinatie van cyber, desinformatie, irreguliere troepen en economische druk','Uitsluitend conventionele militaire middelen','Alleen economische sancties zonder militaire component'], correct:1},
      {q:'Via welk kanaal raakte de Oekraïne-oorlog de eurozone het directst en snelst?', opts:['Via stijgende aandelenkoersen in Europa','Via dalende inflatie door goedkopere importen','Via energieprijzen (gas) en voedselprijzen (graan)','Via dalende wisselkoersen in opkomende markten'], correct:2},
    ])}
  </section>
  `;
}

function renderModule4(){
  return `
  <div class="eyebrow">Module 04 · Beginner</div>
  <h1 class="module-title">Economische geopolitiek en sancties</h1>
  <p class="module-dek">Hoe staten economische middelen inzetten als machtswapens: sancties, exportcontroles, investeringsverboden en valuta-wapens — en hun gevolgen voor markten en supply chains.</p>

  ${renderDashStrip([
    {label:'Actieve sanctie-regimes (VS)', value:'36+', delta:'record 2024 (OFAC)', dir:'down'},
    {label:'Russische activa bevroren', value:'€280 mrd', delta:'G7-maatregelen 2022', dir:'down'},
    {label:'Handelsdéficit VS-China', value:'$295 mrd', delta:'2024, na tarieven', dir:''},
    {label:'CHIPS Act investeringen', value:'$52 mrd', delta:'VS chipsubsidies 2022', dir:'up'},
  ])}

  <section class="block">
    <h3>Economische statecraft <span class="tag">theorie</span></h3>
    <p><b>Economische statecraft</b> is het gebruik van economische middelen voor buitenlandspolitieke doeleinden. Het scala loopt van positieve maatregelen (preferentiële handelsverdragen, investeringsakkoorden) tot negatieve (sancties, boycots, exportverboden). Econoom David Baldwin onderscheidde in 1985 vier hoofdtypen: handelsbeperkingen, financiële restricties, monetaire middelen en technologische beperkingen. Alle vier worden vandaag op grote schaal ingezet.</p>
  </section>

  <section class="block">
    <h3>Sancties: typen en effectiviteit <span class="tag">theorie</span></h3>
    <table class="datatab">
      <tr><th>Type sanctie</th><th>Mechanisme</th><th>Voorbeelden</th><th>Effectiviteit</th></tr>
      <tr><td>Financiële sancties</td><td>Bevriezing activa, uitsluiting bankensysteem, SWIFT-verbod</td><td>Iran, Rusland (2022), Noord-Korea</td><td>Hoog bij dollarafhankelijkheid</td></tr>
      <tr><td>Handelssancties</td><td>Import/exportverbod op specifieke goederen</td><td>VS-Cuba embargo, EU-Rusland olie-embargo</td><td>Matig; ontwijking via derde landen</td></tr>
      <tr><td>Persoonsgerichte sancties</td><td>Reisverbod, bezitsvriesdwang voor individuen</td><td>Magnitsky Act, EU Wit-Russische oligarchen</td><td>Symbolisch en juridisch</td></tr>
      <tr><td>Exportcontroles</td><td>Verbod op overdracht dual-use technologie</td><td>ASML EUV-export naar China, CHIPS Act</td><td>Hoog bij technologiemonopolies</td></tr>
      <tr><td>Investeringsverboden</td><td>Buitenlandse investeringen in strategische sectoren blokkeren</td><td>CFIUS (VS), EU FDI-screening</td><td>Gericht maar omzeiling mogelijk</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>SWIFT-uitsluiting Rusland: directe marktimpact <span class="tag">casestudy</span></h3>
    <div class="case-card">
      <div class="case-head"><span class="case-title">SWIFT-uitsluiting: financieel kernwapen ingezet</span><span class="case-date">26 februari 2022</span></div>
      <p>Na de Russische invasie van Oekraïne werd Rusland — voor de eerste keer voor een grootmacht — uitgesloten van het SWIFT-interbancaire betalingssysteem. Tegelijkertijd werden €280 miljard aan Russische centrale bankreserves bevroren bij westerse partners. Het effect: de roebel verloor aanvankelijk >50% van zijn waarde, de Russische beurs sloot weken. Op langere termijn leidde Rusland zijn handel om via China, India en Turkije — wat aantoont dat sancties effectief maar niet onfeilbaar zijn.</p>
      <div class="case-tickers">
        <span class="ticker down">Russische roebel: RUB 86 → 150 per USD</span>
        <span class="ticker up">Rusland omleidt gas/olie: Asia pivot</span>
        <span class="ticker down">Europese energie: TTF +300%</span>
      </div>
    </div>
  </section>

  <section class="block">
    <h3>Exportcontroles op halfgeleiders: de chips-oorlog <span class="tag">casestudy</span></h3>
    <p>In oktober 2022 kondigde de VS de meest verreikende exportcontroles in decennia aan: ASML (Nederland), TSMC en andere leveranciers mogen geavanceerde chipproductietechnologie niet meer aan Chinese klanten leveren. Dit raakt de Thucydides-val direct: chips zijn de enabler van militaire modernisering, AI en economische competitiviteit. China reageert met eigen chipsubsidies (60 mrd dollar chipfonds) maar loopt technologisch achter.</p>
    <div class="callout warn"><div class="callout-label">Paradox</div>Exportcontroles op chips zijn het meest effectieve economische machtsmiddel in de 21e eeuw — maar ze versnellen ook de Chinese investeringen in eigen chipproductie. Op lange termijn kunnen ze de afhankelijkheid dus verminderen die ze beogen te creëren.</div>
  </section>

  <section class="block">
    <h3>De-globalisering of re-globalisering? <span class="tag">theorie</span></h3>
    <p>Economen debatteren of de wereld echt de-globaliseert of eerder re-globaliseert: niet minder handel, maar handel langs andere lijnen ("friendshoring", "nearshoring"). De data tonen:</p>
    <ul>
      <li>Wereldhandelsvolume bleef stabiel maar werd herschikt: VS-China handel daalde; VS-Mexico en VS-Vietnam handel steeg.</li>
      <li>"Strategic decoupling": gevoelige sectoren (chips, wapens, farma, energie) worden losgekoppeld; consumentengoederen blijven geïntegreerd.</li>
      <li>Hogere structurele kosten: supply chain-diversificatie kost 2–5% extra productiekosten (McKinsey, 2023).</li>
    </ul>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>OFAC (US Treasury): sanctielijsten en updates — directe impact op bedrijfsblootstelling.</li>
      <li>EU Sanctie Map — sanctie-blootstelling per sector en geografie.</li>
      <li>BIS Export Administration Regulations (EAR): VS exportcontroledatabase.</li>
      <li>Handelscijfers via WTO Trade Statistics: herschikking handelsstromen.</li>
      <li>ASML orderboek: proxy voor exportcontroleseverheidheid voor chips.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">OFAC — treasury.gov/ofac</span>
      <span class="source-chip">EU Sanctie Map — sanctionsmap.eu</span>
      <span class="source-chip">WTO Trade Statistics</span>
      <span class="source-chip">CSIS Economics & Security Program</span>
      <span class="source-chip">Peterson Institute — piie.com</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>

function renderModule5(){
  return `
  <div class="eyebrow">Module 05 · Beginner</div>
  <h1 class="module-title">Energie als geopolitiek wapen</h1>
  <p class="module-dek">Hoe olie, gas en hernieuwbare energie de internationale machtsbalans bepalen — en waarom de energietransitie een nieuwe geopolitieke orde schept.</p>

  ${renderDashStrip([
    {label:'Brent Crude (2026)', value:'$78', delta:'▼ van piek $127 (2022)', dir:''},
    {label:'TTF Gas (2026)', value:'€46/MWh', delta:'▼ van piek €340 (2022)', dir:''},
    {label:'VS olie-export (mb/d)', value:'4,5', delta:'netto exporteur (2019)', dir:'up'},
    {label:'Rusland olie-inkomsten', value:'↓−35%', delta:'door EU-embargo (2022)', dir:'down'},
  ])}

  <section class="block">
    <h3>Energiegeopolitiek: het basisprincipe <span class="tag">theorie</span></h3>
    <p>Energie is het bloed van de moderne economie. Staten die energie bezitten of controleren, beschikken over een buitengewoon machtsmiddel: zonder energie stoppen economieën, industrie en leger. De politicoloog Daniel Yergin introduceerde de term "energie-imperialisme" voor de manier waarop grondstoffenrijke staten hun olie en gas als politiek instrument inzetten. De sleuteldynamieken zijn:</p>
    <ul>
      <li><b>Afhankelijkheidsasymmetrie:</b> importerende staten zijn kwetsbaarder dan exporterende.</li>
      <li><b>Monopolisering van routes:</b> wie de pijpleiding of het kanaal controleert, controleert de prijs.</li>
      <li><b>Energiediversificatie als veiligheidsbeleid:</b> waarom de EU na 2022 LNG-terminals bouwde.</li>
      <li><b>Wapen van last resort:</b> energiestop als escalatiemiddel (Arabische oliecrisis 1973, Rusland 2022).</li>
    </ul>
  </section>

  <section class="block">
    <h3>Olieprijs en geopolitieke schokken <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">Brent Crude olieprijs, USD/barrel</div>
      <div class="chart-sub">2018–2026 · EIA/Bloomberg benaderend</div>
      <canvas id="chartBrent5"></canvas>
    </div>
    <div class="case-card">
      <div class="case-head"><span class="case-title">Historische olieschokken</span><span class="case-date">1973 – heden</span></div>
      <p>De wereld heeft vijf grote olieschokken gekend die telkens recessies of grote marktbewegingen veroorzaakten: Arabische embargo (1973), Iraanse Revolutie (1979), Golfoorlog (1990), Chinese groeischok (2007–2008), Russische invasie Oekraïne (2022). Elke schok illustreert hoe energiemarkten de directe transmissiemechanisme zijn van geopolitieke spanning naar de reële economie.</p>
    </div>
  </section>

  <section class="block">
    <h3>TTF Gas: Ruslands energiewapen <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">TTF Gasprijs, EUR/MWh</div>
      <div class="chart-sub">2019–2026 · ICE/EEX benaderend</div>
      <canvas id="chartTTF5"></canvas>
    </div>
    <p>Rusland leverde vóór 2022 circa 40% van het Europese aardgas. Door de oorlog en de sancties daalde dit naar onder 10%. De EU reageerde met LNG-import (VS, Qatar, Noorwegen), energiebesparing en acceleratie van hernieuwbaar. De TTF-gasprijs schoot naar een historisch record van €340/MWh (aug 2022) en normaliseerde daarna — een economische schok van historische omvang voor de Europese industrie.</p>
  </section>

  <section class="block">
    <h3>OPEC+ als geopolitiek instrument <span class="tag">theorie</span></h3>
    <p>OPEC+ (OPEC plus Rusland en andere non-OPEC producenten) coördineert productieplafonds om olieprijzen te sturen. Dit maakt het een uniek geopolitiek forum: Saudi-Arabië en Rusland — strategisch tegenstanders in Syrië en Jemen — co-exploiteren marktkracht via OPEC+. De VS verloor zijn traditionele invloed op Saudi-Arabisch olie-beleid na de energieonafhankelijkheid door schaliegas.</p>
    <div class="callout warn"><div class="callout-label">Geopolitieke paradox</div>OPEC+-besluiten zijn niet alleen economisch. Saudi-Arabische productieverlagingen in 2022–2023 terwijl westerse staten Oekraïne steunden, signaleerden een herpositionering van Riyad weg van de VS. Dit illustreert hoe energie en geopolitieke allianties onlosmakelijk verbonden zijn.</div>
  </section>

  <section class="block">
    <h3>De energietransitie als geopolitieke reset <span class="tag">theorie</span></h3>
    <p>Hernieuwbare energie verschuift de machtsbalans op fundamentele wijze:</p>
    <table class="datatab">
      <tr><th>Fossiel (oud systeem)</th><th>Hernieuwbaar (nieuw systeem)</th></tr>
      <tr><td>Macht: Golfregio, Rusland, VS (schaliegas)</td><td>Macht: zon/windrijke gebieden + kritieke mineralen</td></tr>
      <tr><td>Strategisch: pijplijnen, tankers, straatwachten</td><td>Strategisch: lithium, kobalt, zeldzame aardmetalen</td></tr>
      <tr><td>Importeur-exporteur asymmetrie</td><td>Meer gedistribueerde energieproductie — maar nieuwe minerale afhankelijkheid</td></tr>
      <tr><td>Gevestigde geopolitiek: Golfakkoorden, petrodollar</td><td>Nieuwe geopolitiek: kritieke mineralenroutes, batterijketens (Module 6)</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>Brent Crude en WTI olieprijs — directe geopolitieke thermometer voor Midden-Oosten/Rusland.</li>
      <li>TTF gasprijs — Europese gassituatie en Russische energiedruk.</li>
      <li>EIA Weekly Petroleum Report — VS voorraden en productie.</li>
      <li>OPEC+ vergaderdata en persconferenties — productiebesluiten.</li>
      <li>LNG-spotprijzen en -tankerrates — alternatief energieaanbod.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">IEA — iea.org</span>

      <span class="source-chip">Bruegel Energy Tracker</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz5',[
      {q:'Waarom is energiegeopolitiek asymmetrisch?', opts:['Producerende staten zijn altijd militair sterker','Importerende staten zijn kwetsbaarder dan exporterende staten — ze kunnen worden afgeschakeld','Energie is overal in gelijke mate aanwezig','Energieprijzen worden bepaald door de VN'], correct:1},
      {q:'Hoe reageerde de EU na 2022 op de Russische gasstop?', opts:['Door gas te importeren van Rusland via nieuwe pijplijnen','Door eigen gasboringen te starten in de Noordzee','Door LNG te importeren, energiebesparing in te voeren en hernieuwbaar te accelereren','Door kernenergie volledig te verbieden'], correct:2},
      {q:'Welk land is de grootste bedreiging voor de petrodollar-orde?', opts:['Duitsland','Saudi-Arabië','China — met zijn inspanningen om olie in yuan te verrekenen','Nederland'], correct:2},

function renderModule6(){
  return `
  <div class="eyebrow">Module 06 · Beginner</div>
  <h1 class="module-title">Grondstoffen en kritieke mineralen</h1>
  <p class="module-dek">Lithium, kobalt, nikkel, zeldzame aardmetalen, coltan — de nieuwe strategische activa van de 21e eeuw en hoe hun geografische concentratie een nieuwe geopolitieke orde creëert.</p>

  ${renderDashStrip([
    {label:'China: verwerking zeldzame aardm.', value:'>85%', delta:'globaal marktaandeel 2024', dir:'down'},
    {label:'Congo: kobaltproductie', value:'>70%', delta:'wereld kobalt supply 2024', dir:'down'},
    {label:'EU Critical Raw Materials Act', value:'2024', delta:'34 kritieke mineralen bepaald', dir:''},
    {label:'Lithium toekomstige tekort (2035)', value:'±40%', delta:'bij EV-scenario (IEA)', dir:'down'},
  ])}

  <section class="block">
    <h3>Van olie naar mineralen: de nieuwe strategische activa <span class="tag">theorie</span></h3>
    <p>De 20e eeuw was de eeuw van olie als strategisch middel. De 21e eeuw dreigt de eeuw van <b>kritieke mineralen</b> te worden. De energietransitie (elektrische voertuigen, zonne-energie, windturbines, batterij-opslag) is bijzonder mineraalintensief. Een elektrisch voertuig vereist zes keer meer mineralen dan een conventionele auto. Een offshore windturbine negen keer meer.</p>
    <table class="datatab">
      <tr><th>Mineraal</th><th>Toepassing</th><th>Topproducenten</th><th>Kwetsbaarheid</th></tr>
      <tr><td>Lithium</td><td>EV-batterijen, energieopslag</td><td>Australië, Chili, Argentinië</td><td>"Lithium-driehoek" politieke instabiliteit</td></tr>
      <tr><td>Kobalt</td><td>Batterijkathodes</td><td>DRC (70%+)</td><td>Oorlogszone, kinderarbeid, Chinese controle</td></tr>
      <tr><td>Nikkel</td><td>Batterijen, roestvrij staal</td><td>Indonesië, Filipijnen, Rusland</td><td>Russische productie sanctie-kwetsbaar</td></tr>
      <tr><td>Zeldzame aardmetalen</td><td>Windturbines, elektromotoren, defensie</td><td>China (85%+ verwerking)</td><td>Chinese exportcontroles (2023)</td></tr>
      <tr><td>Gallium/Germanium</td><td>Halfgeleiders, defensie-elektronica</td><td>China (>80%)</td><td>Al onderworpen aan Chinese exportcontroles (2023)</td></tr>
      <tr><td>Koper</td><td>Elektriciteitsinfrastructuur</td><td>Chili, Peru, DRC</td><td>Mijnbouwpolitiek, mijnstakingen</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>China's minerale dominantie <span class="tag">casestudy</span></h3>
    <p>China controleert niet alleen de <i>productie</i> van sommige kritieke mineralen, maar vooral de <i>verwerking</i>. Zelfs als een mineraal in Australië wordt gedolven, wordt het in China verwerkt tot de zuivere componenten die de hightech-industrie nodig heeft. In 2023 kondigde China exportcontroles aan op gallium en germanium — vitale materialen voor halfgeleiders — als reactie op westerse chiprestricties. Dit signaleert een bewuste "minerale vergeldingsstrategie."</p>
    <div class="callout warn"><div class="callout-label">Structureel risico</div>De VS, EU en Japan zijn voor 50–80% van hun kritieke mineralen afhankelijk van China (inclusief verwerking). Dit creëert een strategische kwetsbaarheid die vergelijkbaar is met de Europese gasafhankelijkheid van Rusland vóór 2022.</div>
  </section>

  <section class="block">
    <h3>De "lithium-driehoek" en geopolitiek <span class="tag">casestudy</span></h3>
    <p>Argentinië, Bolivia en Chili bezitten samen circa 60% van de wereldwijde lithiumreserves. Bolivia's besluit om zijn lithiumsector te nationaliseren (en vervolgens te mismanagen) illustreert het klassieke "resource curse"-fenomeen. Chili stelt nieuwe royalties in. Argentinië kampt met economische instabiliteit. Tegelijkertijd investeert China massaal in mijnrechten in de regio, terwijl de EU en VS proberen alternatieve toeleveringsketens te bouwen via de CRMA (Critical Raw Materials Act, 2024).</p>
  </section>

  <section class="block">
    <h3>Halbleiter-investering (semiconductor capex) <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">Globale halfgeleider-investeringen (capex), $miljard</div>

      <canvas id="chartSemiCapex"></canvas>
    </div>
    <p>Overheidssubsidies van de VS (CHIPS Act, $52 mrd), EU (European Chips Act, €43 mrd), Japan en India trachten productie terug naar "vriendschappelijke" landen te brengen. Dit illustreert hoe geopolitiek nu direct de investeringsstroom in de technologiesector stuurt.</p>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>LME (London Metal Exchange) — lithium, kobalt, nikkel, koper spotprijzen.</li>
      <li>Chinese exportcontrole-aankondigingen — directe supply chain-impact.</li>
      <li>EU Critical Raw Materials Act implementatie.</li>
      <li>DRC politieke stabiliteit — kobalt supply-risico.</li>
      <li>TSMC, Samsung, Intel capex-plannen — investeringen als geopolitieke barometer.</li>
    </ul>

      <span class="source-chip">IEA — Critical Minerals Report (2023)</span>
      <span class="source-chip">USGS — Mineral Resources Data</span>
      <span class="source-chip">EU Critical Raw Materials Act</span>

      <span class="source-chip">OECD — mineral supply chain reports</span>
    </div>

    ${quiz('quiz6',[
      {q:'Waarom is kobalt strategisch zo kwetsbaar?', opts:['Het is gevonden in West-Europa','Meer dan 70% van de productie komt uit de DRC, een politiek instabiele conflictzone, en de verwerking wordt gecontroleerd door China','Het is gemakkelijk te vervangen door andere materialen','Het wordt uitsluitend door de VS geproduceerd'], correct:1},
      {q:'Wat deed China in 2023 als reactie op westerse chiprestricties?', opts:['Het verbood alle export van consumentengoederen','Het kondigde exportcontroles aan op gallium en germanium, cruciale materialen voor halfgeleiders','Het verhoogde de tarweproductie als economisch pressiemiddel','Het stapte uit de WTO'], correct:1},
      {q:'Welke maatregel nam de EU in 2024 om kritieke mineralenafhankelijkheid te verminderen?', opts:['Het verbod op Chinese investeringen in alle sectoren','De Critical Raw Materials Act (CRMA) met doelstellingen voor minerale onafhankelijkheid','De oprichting van een Europees mijnbouwleger','Een handelsboycot van Australische mineralen'], correct:1},
    ])}
  </section>
  `;
}

  <section class="block">
    <h3>De architectuur van collectieve veiligheid <span class="tag">theorie</span></h3>
    <p>De NAVO (Noord-Atlantische Verdragsorganisatie) is in 1949 opgericht als collectief veiligheidssysteem op basis van Artikel 5: een aanval op één lid wordt beschouwd als een aanval op alle leden. Dit principe van "<b>één voor allen, allen voor één</b>" is de kern van de westerse veiligheidsarchitectuur. Het is slechts één keer geactiveerd — na de terroristische aanslagen van 11 september 2001.</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>Collectieve veiligheid werkt via afschrikking: een potentiële agressor weet dat hij niet slechts één klein land aanvalt maar 32 gecombineerde strijdkrachten. De geloofwaardigheid van Artikel 5 is daardoor het meest waardevolle bezit van het bondgenootschap.</div>
  </section>

  <section class="block">
    <h3>NAVO-defensie-uitgaven: van 2% naar hoger <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">NAVO gemiddeld defensie-uitgaven, % van BBP</div>
      <div class="chart-sub">2014–2025 · NAVO officiële data, benaderend</div>
      <canvas id="chartNATO8"></canvas>
    </div>
    <div class="case-card">
      <div class="case-head"><span class="case-title">Van "free rider" naar verplichting: de NAVO na Oekraïne</span><span class="case-date">2022–heden</span></div>
      <p>Vóór 2022 haalden slechts 7 NAVO-leden het 2%-BBP-doel. Na de Russische invasie steeg dit naar 23 van de 32 leden. Duitsland kondigde een "Zeitenwende" aan met een speciaal defensiefonds van €100 miljard. Polen verhoogde zijn defensiebegroting naar 4% BBP — het hoogste van alle bondgenoten. NAVO-top Den Haag (2025) maakte 3% BBP een informeel nieuw streefdoel.</p>
      <div class="case-tickers">
        <span class="ticker up">Rheinmetall orderboek: €35 mrd (2024)</span>
        <span class="ticker up">Polska Zbrojenia/PGZ: Poolse defensie-expansie</span>
        <span class="ticker up">KNDS, Thales: EU defensie-orders boom</span>
      </div>
    </div>
  </section>

  <section class="block">
    <h3>NAVO-uitbreiding en Russische doctrine <span class="tag">historische achtergrond</span></h3>
    <p>NAVO-uitbreiding is de centrale casus belli voor Rusland. Kremlin-doctrine stelt dat NAVO-lidmaatschap van Oekraïne een existentiële bedreiging is. Academici zoals John Mearsheimer betoogden al vóór 2022 dat westerse NAVO-uitbreidingspolitiek de Russische invasie provoceerde (een realistisch standpunt). Critici stellen dat dit de Russische soevereiniteitsprincipes miskent. Het debat illustreert hoe academische paradigma's (realisme vs. liberalisme) tot diametraal andere beleidsconsequenties leiden.</p>
  </section>

  <section class="block">
    <h3>NAVO-uitdagingen: Artikel 5-geloofwaardigheid <span class="tag">theorie</span></h3>
    <ul>
      <li><b>Hybride dreiging:</b> een cyberaanval of sabotage-campagne zonder geüniformeerde soldaten — valt dit onder Artikel 5? NAVO's "Tallinn Manual" poogt dit te codificeren.</li>
      <li><b>Trump-factor:</b> de VS-president suggereerde meermalen NAVO-verplichtingen voorwaardelijk te maken, wat de geloofwaardigheid van Artikel 5 ondermijnde.</li>
      <li><b>Europese strategische autonomie:</b> de EU probeert via PESCO en het Europese Defensiefonds eigen capaciteiten te bouwen — aanvullend of concurrent aan NAVO?</li>
      <li><b>Turkse ambiguïteit:</b> Turkije als lid balanceert tussen NAVO en relatie met Rusland.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>NAVO jaarlijkse burden sharing rapportage — defensie-% per lid.</li>
      <li>NAVO toppen (communiqués) — veranderingen in strategisch concept en toezeggingen.</li>
      <li>Defensie-orderboeken (Rheinmetall, BAE, Airbus Defence) — proxy voor NAVO-investeringen.</li>
      <li>Russische militaire activiteit aan NAVO-flanken (Baltische staten, Oost-Polen).</li>
      <li>Diplomatieke signalen VS t.a.v. NAVO-toewijding — kritisch voor bondgenootschapsgeloofwaardigheid.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">NATO — nato.int</span>
      <span class="source-chip">IISS Military Balance</span>
      <span class="source-chip">SIPRI Fact Sheet — NAVO expenditures</span>
      <span class="source-chip">Mearsheimer — Why the Ukraine Crisis Is the West's Fault (2014)</span>
      <span class="source-chip">EUISS — iss.europa.eu</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz8',[
      {q:'Wat houdt Artikel 5 van het NAVO-verdrag in?', opts:['Alle leden moeten 2% van hun BBP aan defensie uitgeven','Een aanval op één NAVO-lid wordt beschouwd als een aanval op alle leden','NAVO-leden mogen nooit buiten hun eigen grondgebied opereren','De NAVO heeft een gedeelde kernwapenstrategie'], correct:1},
      {q:'Wanneer werd Artikel 5 voor het eerst geactiveerd?', opts:['Tijdens de Koude Oorlog, na een Russische aanval','Na de Russische invasie van Oekraïne in 2022','Na de terroristische aanslagen van 11 september 2001','Nooit — het is tot nu toe alleen een theoretisch principe'], correct:2},
      {q:'Wat was de "Zeitenwende" van Duitsland?', opts:['Een nieuwe handelsstrategie gericht op Asia','Een fundamentele beleidsomslag met een speciaal defensiefonds van €100 miljard na de Russische invasie','Een milieuplan voor de energietransitie','Een besluit om de NAVO te verlaten'], correct:1},
    ])}
  </section>
  `;
}

function renderModule9(){
  return `
  <div class="eyebrow">Module 09 · Beginner</div>
  <h1 class="module-title">De Europese Unie als geopolitieke actor</h1>
  <p class="module-dek">Van economische supermacht naar geopolitieke speler: de EU's groeiende rol in handel, veiligheid, regelgeving en de concurrentie om mondiale standaarden.</p>

  ${renderDashStrip([
    {label:'EU BBP (PPP)', value:'$24T', delta:'tweede economie wereldwijd', dir:''},
    {label:'EU buitenlandse directe invest.', value:'€7T+', delta:'grootste exporteur kapitaal', dir:'up'},
    {label:'PESCO-projecten', value:'60+', delta:'EU defensiesamenwerking', dir:'up'},
    {label:'EU sanctie-pakketten Rusland', value:'14+', delta:'2022–2025', dir:''},
  ])}

  <section class="block">
    <h3>De EU: een ander soort macht <span class="tag">theorie</span></h3>
    <p>De EU is geen traditionele statelijke actor. Ze heeft geen eigen leger, geen eigen buitenlandminister met uitvoerende bevoegdheid, en besluitvorming vereist consensusprincipes. Toch is de EU geopolitiek invloedrijk via drie mechanismen:</p>
    <ul>
      <li><b>Regulatorische macht:</b> De "Brussels Effect" — EU-regelgeving (GDPR, AI Act, ESG-richtlijnen, product-standaarden) bepaalt de mondiale norm doordat bedrijven hun producten voor de EU-markt aanpassen, en die standaard dan globaal toepassen.</li>
      <li><b>Handelsmacht:</b> De EU is de grootste handelsblok ter wereld. Toegang tot de EU-interne markt is een krachtig onderhandelingswapen.</li>
      <li><b>Financiële macht:</b> De euro is de tweede reservevaluta; EU-aantrekkingskracht via fondsen, investeringen en conditionaliteit (democratie, rechtsstaat).</li>
    </ul>
  </section>

  <section class="block">
    <h3>De EU en de Oekraïne-crisis: geopolitieke volwassenheid <span class="tag">casestudy</span></h3>
    <p>De Russische invasie van 2022 dwong de EU tot ongekende geopolitieke stappen:</p>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Ongekende sancties</b><span>14+ sanctiepakketten, SWIFT-uitsluiting, activabevriezing €280 mrd — de zwaarste sancties ooit opgelegd door de EU.</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Wapenlevering</b><span>Via het Europees Vredesfaciliteit financierde de EU voor het eerst in haar bestaan de leverantie van dodelijke wapens aan een oorlogvoerend land (Oekraïne).</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Energie-onafhankelijkheid</b><span>REPowerEU-plan: €210 mrd voor diversificatie van energielevering en versnelde uitrol van hernieuwbaar.</span></div></div>
      <div class="step"><div class="step-num">04</div><div class="step-body"><b>EU-kandidaatlidmaatschap Oekraïne</b><span>In juni 2022 gaf de EU Oekraïne kandidaatstatus — een historische stap met vergaande geopolitieke implicaties.</span></div></div>
    </div>
  </section>

  <section class="block">
    <h3>Brussels Effect: regelgeving als machtsuitoefening <span class="tag">theorie</span></h3>
    <p>De "Brussels Effect" (Columbia Law professor Anu Bradford) stelt dat de EU-regelgeving globaliseert, niet omdat andere landen gedwongen worden maar omdat multinationals één mondiale productieslijn gebruiken. Voorbeelden: GDPR bepaalt nu de globale privacynorm; de EU Battery Regulation stelt eisen aan kobaltverantwoording wereldwijd; de Carbon Border Adjustment Mechanism (CBAM) exporteert de EU koolstofprijs naar handelspartners.</p>
    <div class="callout"><div class="callout-label">Implicatie</div>De EU oefent geopolitieke macht uit via regelgeving — zonder één soldaat of diplomaat. Dit is uniek in de mondiale politiek en een onderschat instrument.</div>
  </section>

  <section class="block">
    <h3>EU strategische autonomie vs. Atlantische solidariteit <span class="tag">theorie</span></h3>
    <p>Frankrijks president Macron heeft "strategische autonomie" op de EU-agenda geplaatst: Europa moet in staat zijn zelf te handelen, ook zonder VS. Dit staat in spanningsverhouding met de Atlantische solidariteit die kleinere EU-leden (Polen, Baltische staten) verkiezen. Het debat over eigen defensiecapaciteit, technologische soevereiniteit (EU chipsstrategie) en diplomatieke onafhankelijkheid (China-beleid) illustreert de fundamentele spanning in de EU-buitenlandpolitiek.</p>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>Europese Raad-conclusies — hoogste diplomatieke signalen van EU-leden.</li>
      <li>Europees Defensiefonds (EDF) en PESCO-voortgang — EU militaire samenwerking.</li>
      <li>EU handelsdeficit/-surplus per partner (Eurostat) — economische afhankelijkheden.</li>
      <li>Euro-dollar wisselkoers — geopolitieke stress in eurozone zichtbaar.</li>
      <li>EU uitbreidingsproces — nieuwe kandidaatleden (Oekraïne, Moldova, Westelijke Balkan).</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">Europese Commissie — ec.europa.eu</span>
      <span class="source-chip">EUISS — iss.europa.eu</span>
      <span class="source-chip">Anu Bradford — The Brussels Effect (2020)</span>
      <span class="source-chip">ECFR — ecfr.eu</span>
      <span class="source-chip">Eurostat — ec.europa.eu/eurostat</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz9',[
      {q:'Wat is het "Brussels Effect"?', opts:['De tendens van EU-landen om te klagen over Brusse ls\' bureaucratie','Het fenomeen dat EU-regelgeving de mondiale standaard wordt doordat multinationals hun producten voor de EU-markt aanpassen','Een militaire operatie van de EU in Afrika','De uitbreiding van de EU naar het oosten'], correct:1},
      {q:'Wat deed de EU voor het eerst in haar bestaan n.a.v. de Russische invasie van Oekraïne?', opts:['Eigen troepen sturen naar een conflictgebied','Via het Europees Vredesfaciliteit dodelijke wapens financieren voor een oorlogvoerend land','De euro koppelen aan de dollar','Het Schengen-akkoord opschorten'], correct:1},
      {q:'Hoe verschilt EU-macht van traditionele statelijke macht?', opts:['De EU heeft de sterkste conventionele strijdkrachten ter wereld','De EU oefent macht uit via regelgeving, handel en financiën — niet via militaire macht','De EU heeft geen enkele internationale invloed','De EU bepaalt het buitenlandbeleid van haar leden volledig'], correct:1},
    ])}
  </section>
  `;
}

  <section class="block">
    <h3>Rusland's geopolitieke zelfbeeld <span class="tag">theorie</span></h3>
    <p>Rusland's buitenlands beleid wordt sterk gevormd door geografisch determinisme en historisch trauma. Zonder natuurlijke barrières op het Noord-Europese laagland is Rusland herhaaldelijk binnengevallen (Napoleon 1812, Duitsland 1941). Dit voedt een diepgewortelde strategische cultuur van <b>bufferzones</b>: controle over aangrenzende staten als veiligheidsgordel. De doctrine van "nabije buitenland" (blizhneye zarubezhye) beschouwt de voormalige Sovjet-ruimte als legitieme invloedssfeer.</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>Poetin's toespraken sinds 2007 (München-toespraak) formuleren een consistente these: de NAVO-uitbreiding naar het Oosten is een existentiële bedreiging die rechtvaardigt om met harde middelen te reageren — een these die het Westen grotendeels afwijst als rechtvaardiging voor agressie, maar die intern de Russische strategie verklaart.</div>

  <section class="block">
