function renderModule14(){
  return `
  <div class="eyebrow">Module 14 · Gevorderd</div>
  <h1 class="module-title">BRICS en de opkomst van het Zuiden</h1>
  <p class="module-dek">Hoe een informeel acroniem uitgroeide tot een geopolitiek project voor een multipolaire, minder op de dollar gerichte wereldorde.</p>

  ${renderDashStrip([
    {label:'BRICS-aandeel mondiaal BBP (PPP)', value:'39%', delta:'groter dan G7', dir:''},
    {label:'Aantal BRICS(+)-leden', value:'11', delta:'was 5 tot 2023', dir:'up'},
    {label:'USD-aandeel wereldreserves', value:'56%', delta:'geleidelijke daling', dir:'down'},
    {label:'BRICS-aandeel wereldbevolking', value:'~46%', delta:'na uitbreiding 2024', dir:''},
  ])}

  <section class="block">
    <h3>Van beleggingsacroniem tot geopolitiek blok <span class="tag">historische achtergrond</span></h3>
    <p>De term "BRIC" werd in 2001 bedacht door Goldman Sachs-econoom Jim O'Neill als beleggingsthese over opkomende groeimarkten — niet als politiek project. Brazilië, Rusland, India en China formaliseerden desondanks vanaf 2009 jaarlijkse topontmoetingen; Zuid-Afrika sloot in 2010 aan (BRICS). In 2024 breidde de groep sterk uit met Egypte, Ethiopië, Iran, VAE en Saoedi-Arabië (deels) — een expliciete poging om een tegenwicht te vormen tegen westers-gedomineerde instellingen.</p>
    <div class="chart-wrap">
      <div class="chart-title">BRICS-aandeel in mondiaal BBP (PPP), %</div>
      <div class="chart-sub">Bron: IMF WEO · benaderend</div>
      <canvas id="chartBricsGdp14"></canvas>
    </div>
  </section>

  <section class="block">
    <h3>De-dollarisatie: retoriek versus realiteit <span class="tag">framework</span></h3>
    <table class="datatab">
      <tr><th>Initiatief</th><th>Doel</th><th>Status</th></tr>
      <tr><td>New Development Bank (NDB)</td><td>Alternatief voor Wereldbank/IMF-financiering</td><td>Operationeel sinds 2015, beperkte schaal</td></tr>
      <tr><td>Lokale-valutahandel</td><td>Bilaterale handel buiten USD om (bv. yuan-roebel)</td><td>Groeiend maar klein aandeel mondiale handel</td></tr>
      <tr><td>BRICS Pay / gezamenlijke munt</td><td>Alternatief betalingssysteem</td><td>Nog grotendeels conceptueel, geen consensus</td></tr>
      <tr><td>Goudreserve-opbouw</td><td>Diversificatie weg van USD-reserves</td><td>China, Rusland, India kopen structureel goud bij</td></tr>
    </table>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Een "BRICS-munt" die de dollar op korte termijn vervangt, is economisch onrealistisch: de leden hebben zeer uiteenlopende monetaire beleidsdoelen, kapitaalcontroles en vertrouwen in elkaars centrale banken. De reële trend is geleidelijke diversificatie, geen abrupte vervanging.</div>
  </section>

  <section class="block">
    <h3>Interne spanningen binnen BRICS <span class="tag">theorie</span></h3>
    <p>BRICS is geen coherent blok. India en China hebben een actief grensconflict (Himalaya) en concurreren om regionale invloed; Brazilië en India blijven democratieën met nauwe westerse handelsbanden; de opname van Iran creëert spanning met de meer westers-georiënteerde leden. BRICS functioneert eerder als een <b>coalitie van gemak</b> tegen westerse dominantie in instellingen, dan als een ideologisch verenigd blok.</p>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>IMF COFER-data: samenstelling mondiale valutareserves per kwartaal.</li>
      <li>Bilaterale handelsafwikkeling in lokale valuta (PBoC, RBI-rapportages).</li>
      <li>Uitkomsten van jaarlijkse BRICS-toppen — nieuwe leden, gezamenlijke verklaringen.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">IMF COFER — data.imf.org</span>
      <span class="source-chip">New Development Bank — ndb.int</span>
      <span class="source-chip">Council on Foreign Relations — BRICS tracker</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz14',[
      {q:'Wie bedacht de term "BRIC" en met welk doel?', opts:['De Chinese regering, als politiek project','Goldman Sachs-econoom Jim ONeill, als beleggingsthese over groeimarkten','De Verenigde Naties, als ontwikkelingsprogramma','Het IMF, als noodfonds'], correct:1},
      {q:'Wat is de meest realistische interpretatie van "de-dollarisatie" binnen BRICS?', opts:['De dollar wordt binnen 2 jaar volledig vervangen','Een geleidelijke diversificatie van reserves en handelsafwikkeling, geen abrupte vervanging','Er vindt helemaal geen verandering plaats','Alle BRICS-landen hebben al een gezamenlijke munt ingevoerd'], correct:1},
      {q:'Wat typeert de interne samenhang van BRICS het best?', opts:['Een ideologisch volledig verenigd militair blok','Een coalitie van gemak met aanzienlijke interne spanningen (o.a. India-China)','Een formele vrijhandelszone zoals de EU','Een verdrag met bindende collectieve defensie'], correct:1},
    ])}
  </section>
  `;
}

    <p>Klimaatverandering wordt door defensie-instellingen wereldwijd (o.a. het Amerikaanse Pentagon en de EU) beschouwd als een <b>threat multiplier</b>: het veroorzaakt zelden rechtstreeks oorlog, maar verergert bestaande spanningen via voedselonzekerheid, waterschaarste en gedwongen migratie. De Sahel-regio illustreert dit: dalende regenval en woestijnvorming verscherpen conflicten tussen herders en boeren, wat weer voedingsbodem biedt voor gewapende groeperingen.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Klimaatverandering "veroorzaakt" zelden alleen een conflict. De causale keten loopt via economische en sociale kanalen: misoogsten verhogen voedselprijzen, wat sociale onrust voedt in landen met zwakke instellingen. De onderliggende bestuurskwaliteit bepaalt of klimaatstress tot conflict escaleert.</div>

      <p>De Grand Ethiopian Renaissance Dam (GERD) geeft Ethiopie controle over de Blauwe Nijl-stroom, waarvan Egypte voor meer dan 90% van zijn zoetwater afhankelijk is. Onderhandelingen over vulsnelheid en waterverdeling bleven jarenlang muurvast — een schoolvoorbeeld van hoe infrastructuur op een gedeelde rivier tot interstatelijke spanning leidt zonder dat er daadwerkelijk oorlog uitbrak.</p>

  <section class="block">

      <canvas id="chartUSD18"></canvas>
    </div>
    <p>De status van de Amerikaanse dollar als wereldwijde reservevaluta geeft de VS unieke macht: het "exorbitante privilege" om schulden in eigen valuta te financieren tegen lage rente, en de mogelijkheid om via het financiele systeem (SWIFT, correspondentbankieren) sancties af te dwingen die vrijwel elk land raken dat internationaal handelt. Deze dominantie is echter geleidelijk aan het afkalven — al blijft een snelle vervanging economisch onwaarschijnlijk gezien het ontbreken van een even liquide, vertrouwd alternatief.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Het aankondigen van "de-dollarisatie" door BRICS-landen wordt vaak overschat als onmiddellijke dreiging. Reservevaluta-status vereist diepe, liquide kapitaalmarkten, kapitaalconvertibiliteit en rechtszekerheid — eigenschappen die geen enkel alternatief momenteel op vergelijkbare schaal biedt.</div>

  <section class="block">
    <h3>Van nieuws naar risicoscore <span class="tag">framework</span></h3>
    <p>Professionele geopolitieke risico-analyse vermijdt reactief nieuwsvolgen en werkt in plaats daarvan met een gestructureerd proces: <b>identificatie</b> van risicofactoren, <b>waarschijnlijkheidsinschatting</b>, <b>impactanalyse</b> per activaklasse, en <b>monitoring</b> van leading indicators. Het doel is niet voorspellen wanneer een conflict uitbreekt, maar begrijpen welke blootstelling een portefeuille of onderneming heeft als het gebeurt.</p>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Risico-identificatie</b><span>Welke landen, sectoren en toeleveringsketens zijn blootgesteld aan welk type geopolitiek risico?</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Waarschijnlijkheid</b><span>Baseline-inschatting op basis van historische escalatiepatronen, niet op basis van de laatste krantenkop.</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Impactkanalen</b><span>Direct (activa in het land), indirect (toeleveringsketen), macro (grondstofprijzen, valuta).</span></div></div>
      <div class="step"><div class="step-num">04</div><div class="step-body"><b>Monitoring</b><span>Vaste set leading indicators per risico, met vooraf gedefinieerde actiedrempels.</span></div></div>

      <tr><td>Grondstoffen</td><td>Directe aanbodverstoring (olie, gas, granen, metalen)</td></tr>

    <div class="callout"><div class="callout-label">Kernpunt</div>Marktreacties op geopolitieke schokken zijn historisch vaak kortstondig: de gemiddelde S&P 500-terugval na een geopolitieke gebeurtenis herstelt doorgaans binnen enkele weken, tenzij de schok structureel een grondstofstroom of toeleveringsketen blijvend verstoort.</div>

  <section class="block">

function renderModule22(){

  <h1 class="module-title">Scenario-analyse en oorlogsplannen</h1>
  <p class="module-dek">Hoe professionele instellingen structureel meerdere toekomstscenarios bouwen in plaats van een enkele voorspelling te doen.</p>

  ${renderDashStrip([
    {label:'Gangbare scenario-horizon', value:'6-24 maanden', delta:'voor tactische allocatie', dir:''},
    {label:'Typisch aantal scenarios', value:'3-5', delta:'incl. staartrisico-scenario', dir:''},
    {label:'Taiwan-scenario waarschijnlijkheid (marktconsensus)', value:'laag op korte termijn', delta:'maar niet verwaarloosbaar', dir:'down'},
  ])}

  <section class="block">
    <h3>Waarom scenario-analyse en geen puntvoorspelling <span class="tag">theorie</span></h3>
    <p>Geopolitieke uitkomsten zijn inherent onzeker en worden gedreven door menselijke besluitvorming onder druk — niet door voorspelbare fysieke wetten. In plaats van een enkele voorspelling te doen ("er komt oorlog" of "er komt geen oorlog"), bouwen professionele analisten een <b>waaier van scenarios</b>, elk met een geschatte waarschijnlijkheid en een set concrete marktimplicaties. Dit dwingt discipline af: besluitvormers wegen expliciet de kosten van elk scenario, in plaats van te anker op een enkele overtuiging.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Het scenario met de hoogste waarschijnlijkheid is niet automatisch het scenario om op te positioneren. Een laag-waarschijnlijkheid scenario met extreme impact (bijvoorbeeld een Taiwan-blokkade) kan een grotere verwachte-verliesbijdrage hebben dan een hoog-waarschijnlijkheid scenario met beperkte impact.</div>
  </section>

  <section class="block">
    <h3>Scenario-framework: Taiwan-straat <span class="tag">framework</span></h3>
    <table class="datatab">
      <tr><th>Scenario</th><th>Geschatte waarschijnlijkheid</th><th>Marktimplicatie</th></tr>
      <tr><td>Status quo aanhoudende spanning</td><td>Hoog</td><td>Beperkte, periodieke volatiliteit rond militaire oefeningen</td></tr>
      <tr><td>Verscherpte blokkade/quarantaine zonder directe invasie</td><td>Matig</td><td>Scherpe stijging verzekeringspremies scheepvaart, chipprijzen omhoog</td></tr>
      <tr><td>Volledige militaire confrontatie</td><td>Laag op korte termijn</td><td>Mondiale chipschaarste, sterke risicomijding, energie- en grondstofpieken</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Methodologie: van kwalitatief naar kwantitatief <span class="tag">framework</span></h3>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Actoranalyse</b><span>Wat zijn de expliciete en impliciete doelen van elke betrokken partij?</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Escalatieladder opstellen</b><span>Welke stappen liggen tussen de huidige situatie en een worst-case uitkomst?</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Waarschijnlijkheden toekennen</b><span>Gebaseerd op historische precedenten en expertconsultatie, niet giswerk.</span></div></div>
      <div class="step"><div class="step-num">04</div><div class="step-body"><b>Marktimplicaties per scenario mappen</b><span>Welke activaklassen, sectoren en regios worden hoe geraakt?</span></div></div>
      <div class="step"><div class="step-num">05</div><div class="step-body"><b>Portefeuille-aanpassingen definieren</b><span>Vooraf bepaalde triggerpunten om positionering aan te passen, om paniekbeslissingen te vermijden.</span></div></div>
    </div>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>Militaire bewegingsindicatoren (satellietbeelden, vluchtactiviteit) via open-sourceplatformen.</li>
      <li>Diplomatieke signalen — communiqués, ambassadeursoproepingen.</li>
      <li>Marktgebaseerde impliciete waarschijnlijkheden (optieprijzen, verzekeringspremies).</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">RAND Corporation — rand.org</span>
      <span class="source-chip">CSIS Scenario Planning</span>
      <span class="source-chip">Eurasia Group — eurasiagroup.net</span>

  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz22',[
      {q:'Waarom werken professionele analisten met scenariowaaiers in plaats van een enkele voorspelling?', opts:['Omdat het makkelijker is dan een echte analyse maken','Omdat geopolitieke uitkomsten inherent onzeker zijn en meerdere uitkomsten expliciet gewogen moeten worden','Omdat klanten enkel scenarios willen lezen','Omdat een enkele voorspelling wettelijk verboden is'], correct:1},
      {q:'Waarom kan een laag-waarschijnlijkheid scenario toch het belangrijkste zijn voor positionering?', opts:['Omdat waarschijnlijkheid er niet toe doet','Omdat de verwachte-verliesbijdrage (kans x impact) hoog kan zijn bij extreme impact','Omdat lage waarschijnlijkheid altijd genegeerd moet worden','Omdat enkel zekere gebeurtenissen relevant zijn'], correct:1},
      {q:'Wat is de eerste stap in het scenario-analysemethodologie beschreven in dit hoofdstuk?', opts:['Portefeuille onmiddellijk herpositioneren','Actoranalyse: de doelen van elke betrokken partij in kaart brengen','Enkel de krantenkoppen van vandaag lezen','Wachten tot het conflict voorbij is'], correct:1},

  `;

function renderModule28(){

  <section class="block">
    <h3>Kwalitatieve versus kwantitatieve modellen <span class="tag">theorie</span></h3>
    <p>Politieke risicoanalyse combineert doorgaans twee benaderingen. <b>Kwalitatieve modellen</b> steunen op expertoordeel: regionale specialisten scoren landen op basis van institutionele kwaliteit, machtsovergangsrisico en conflictgeschiedenis. <b>Kwantitatieve modellen</b> gebruiken statistische indicatoren (verkiezingsfrequentie, corruptie-indices, persvrijheid, economische volatiliteit) om een samengestelde risicoscore te berekenen. De meeste institutionele providers (EIU, Verisk Maplecroft, PRS Group) combineren beide voor een hybride score.</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>Politiek risico is geen statische eigenschap van een land, maar een dynamische kans die verandert met verkiezingscycli, leiderschapswissels en externe schokken. Modellen moeten daarom periodiek herzien worden, niet als eenmalige score worden behandeld.</div>

  <section class="block">

function renderModule29(){
  return `
  <div class="eyebrow">Module 29 · Expert</div>
  <h1 class="module-title">Geopolitieke psychologie en leiderschap</h1>
  <p class="module-dek">Hoe cognitieve vertekeningen bij zowel leiders als analisten geopolitieke escalatie en foutieve inschattingen beinvloeden.</p>

  ${renderDashStrip([
    {label:'Belangrijkste bias in escalatie-analyse', value:'spiegelbeelddenken', delta:'mirror-imaging', dir:''},
    {label:'Historische misrekeningen door groepsdenken', value:'meerdere grote precedenten', delta:'Cubacrisis, Irak 2003', dir:''},
  ])}

  <section class="block">
    <h3>Cognitieve vertekeningen bij leiders <span class="tag">theorie</span></h3>
    <p>Geopolitieke beslissingen worden genomen door individuen onder tijdsdruk, onvolledige informatie en politieke druk — niet door perfect rationele actoren. Bekende vertekeningen zijn <b>spiegelbeelddenken</b> (mirror-imaging: aannemen dat een tegenstander volgens dezelfde logica redeneert als jijzelf), <b>groepsdenken</b> (conformiteit binnen een besluitvormingsgroep onderdrukt kritische tegenspraak) en <b>bevestigingsbias</b> (enkel informatie zoeken die bestaande overtuigingen bevestigt).</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>De term groupthink werd geintroduceerd door psycholoog Irving Janis na analyse van de mislukte Varkensbaai-invasie (1961) — een voorbeeld van hoe een hechte adviesgroep kritische vragen onderdrukte uit angst de consensus te verstoren.</div>
  </section>

  <section class="block">
    <h3>Leiderschapsstijl en risicobereidheid <span class="tag">framework</span></h3>
    <table class="datatab">
      <tr><th>Bias</th><th>Effect op besluitvorming</th><th>Historisch voorbeeld</th></tr>
      <tr><td>Spiegelbeelddenken</td><td>Onderschat andere strategische cultuur/waarden van tegenstander</td><td>Amerikaanse inschattingsfouten voor de Vietnamoorlog</td></tr>
      <tr><td>Groepsdenken</td><td>Onderdrukt kritische tegenspraak binnen adviesgroep</td><td>Varkensbaai-invasie 1961</td></tr>
      <tr><td>Overmoed na eerdere overwinning</td><td>Overschat eigen slagkracht in vervolgconflict</td><td>Diverse escalatiebeslissingen in de geschiedenis van interstatelijke conflicten</td></tr>
      <tr><td>Sunk cost-drijfveer</td><td>Vasthouden aan mislukt beleid om eerdere investering niet te "verspillen"</td><td>Langdurige aanslepende conflicten met moeizame exitstrategie</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Wat analisten hiertegen kunnen doen <span class="tag">stappenplan</span></h3>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Devil's advocate inbouwen</b><span>Structureel iemand aanwijzen om de heersende consensus te weerleggen.</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Red teaming</b><span>Een apart team laat het scenario vanuit het perspectief van de tegenstander analyseren.</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Pre-mortem analyse</b><span>Voor een beslissing al inbeelden dat ze faalde, en vragen waarom.</span></div></div>
    </div>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>Leiderschapswissels en hun historische risicoprofiel (biografische analyse).</li>
      <li>Interne signalen van dissent of juist unanimiteit in overheidscommunicatie.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">Irving Janis — Victims of Groupthink (1972)</span>
      <span class="source-chip">Robert Jervis — Perception and Misperception in International Politics</span>
      <span class="source-chip">Graham Allison — Essence of Decision</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz29',[
      {q:'Wat betekent spiegelbeelddenken (mirror-imaging) in geopolitieke analyse?', opts:['Het letterlijk kopieren van vijandelijke wapensystemen','Aannemen dat een tegenstander volgens dezelfde logica en waarden redeneert als jijzelf','Een techniek om satellietbeelden te analyseren','Een vorm van propaganda gericht op het eigen volk'], correct:1},
      {q:'Welke historische gebeurtenis inspireerde het concept groupthink van Irving Janis?', opts:['De Cubacrisis van 1962','De mislukte Varkensbaai-invasie van 1961','De Val van de Berlijnse Muur','De Golfoorlog van 1991'], correct:1},
      {q:'Wat is het doel van red teaming in geopolitieke besluitvorming?', opts:['Het budget van een project verhogen','Een scenario vanuit het perspectief van de tegenstander laten analyseren om blinde vlekken te ontdekken','Enkel positieve scenario\\u2019s bevestigen','Een team ontbinden na een fout'], correct:1},
    ])}
  </section>
  `;
}

  <section class="block">
    <h3>De naoorlogse institutionele architectuur <span class="tag">historische achtergrond</span></h3>
    <p>Na 1945 bouwden de geallieerde overwinnaars een stelsel van instellingen om herhaling van de wereldoorlogen te voorkomen: de <b>Verenigde Naties</b> (collectieve veiligheid), het <b>IMF</b> en de <b>Wereldbank</b> (monetaire stabiliteit en ontwikkeling, opgericht op de Bretton Woods-conferentie van 1944) en later de <b>GATT/WTO</b> (vrijhandel). Dit systeem weerspiegelde de machtsverhoudingen van 1945 — vandaar het permanente vetorecht voor de vijf overwinnaars in de VN-Veiligheidsraad, een structuur die opkomende machten als India en Brazilie steeds nadrukkelijker ter discussie stellen.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>De VN-Veiligheidsraad wordt vaak verward met "de VN" als geheel. De Algemene Vergadering kan resoluties aannemen die politiek gewicht dragen, maar enkel de Veiligheidsraad kan juridisch bindende dwangmaatregelen opleggen — en elk permanent lid kan die blokkeren met een veto.</div>

  <section class="block">

function renderModule31(){

  <h1 class="module-title">Kwantitatieve geopolitieke modellen</h1>

  ])}

  <section class="block">
    <h3>Van kwalitatief risico naar kwantitatieve factor <span class="tag">theorie</span></h3>
    <p>Kwantitatieve teams proberen geopolitiek risico te operationaliseren als een <b>factor</b> vergelijkbaar met waarde, momentum of kwaliteit in factorbeleggen. De Caldara-Iacoviello GPR-index wordt bijvoorbeeld gebruikt als verklarende variabele in regressiemodellen tegen activarendementen, volatiliteit en risicopremies. Het doel is niet perfecte voorspelling, maar het kwantificeren van de gevoeligheid (beta) van een portefeuille aan geopolitieke schokken.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Geopolitieke schokken zijn zeldzaam en heterogeen — elk conflict verschilt fundamenteel van het vorige. Dit maakt statistische modellen structureel kwetsbaar voor overfitting op een klein aantal historische episodes. Kwantitatieve modellen moeten daarom altijd aangevuld worden met kwalitatief scenario-oordeel.</div>
  </section>

  <section class="block">
    <h3>Veelgebruikte kwantitatieve technieken <span class="tag">framework</span></h3>

      <tr><td>Factorregressie</td><td>GPR-index als verklarende variabele voor rendementen/spreads</td></tr>
      <tr><td>Value-at-Risk (VaR) met staartaanpassing</td><td>Extra risicobuffer inbouwen voor staartrisico-scenario's van lage waarschijnlijkheid</td></tr>

  <section class="block">

      <li>GPR-index als tijdreeks in kwantitatieve modellen (dagelijks beschikbaar).</li>
      <li>Impliciete volatiliteit (optiemarkt) als marktgebaseerde risicomaatstaf.</li>

  <section class="block">
    <h3>Data & bronnen</h3>

function renderModule32(){
  return `
  <div class="eyebrow">Module 32 · Professional / Institutioneel</div>
  <h1 class="module-title">Nowcasting van conflicten en crises</h1>
  <p class="module-dek">Hoe machine learning en real-time datastromen worden ingezet om conflictescalatie vroegtijdig te detecteren.</p>

  ${renderDashStrip([

  ])}

  <section class="block">
    <h3>Wat is nowcasting? <span class="tag">theorie</span></h3>
    <p><b>Nowcasting</b> verwijst naar het schatten van de huidige of zeer nabije toekomstige staat van een systeem op basis van real-time datastromen, in plaats van klassieke lange-termijnvoorspelling. Toegepast op conflicten combineert dit gestructureerde event-databases (ACLED, GDELT — Global Database of Events, Language and Tone), satellietbeelden (troepenbewegingen, infrastructuurschade) en soms sociale-mediasignalen om escalatie te detecteren voordat traditionele nieuwsrapportage het bevestigt.</p>
    <div class="callout"><div class="callout-label">Kernpunt</div>GDELT verwerkt dagelijks miljoenen nieuwsartikelen wereldwijd in tientallen talen en codeert gebeurtenissen automatisch naar type en toon — dit maakt het mogelijk om conflictintensiteit per regio bijna in real time te kwantificeren, in plaats van te wachten op maandelijkse rapportages.</div>

  <section class="block">

function renderModule33(){
  return `
  <div class="eyebrow">Module 33 · Professional / Institutioneel</div>
  <h1 class="module-title">Bayesian risico-inschatting in geopolitiek</h1>
  <p class="module-dek">Hoe Bayesiaanse methoden toelaten om waarschijnlijkheden van geopolitieke scenario's systematisch bij te werken naarmate nieuwe informatie binnenkomt.</p>

  ${renderDashStrip([
    {label:'Kernvoordeel Bayesiaanse aanpak', value:'expliciete update van overtuigingen', delta:'i.p.v. statische inschatting', dir:''},
  ])}

  <section class="block">
    <h3>Waarom Bayesiaans denken past bij geopolitiek <span class="tag">theorie</span></h3>
    <p>Bayesiaanse statistiek combineert een <b>prior</b> (aanvankelijke waarschijnlijkheidsinschatting, gebaseerd op historische precedenten) met nieuw bewijs om een <b>posterior</b> (bijgewerkte waarschijnlijkheid) te berekenen. Dit past natuurlijk bij geopolitieke analyse: een analist begint met een basisinschatting van bijvoorbeeld een Taiwan-scenario, en werkt deze systematisch bij naarmate nieuwe signalen (troepenbewegingen, diplomatieke uitspraken) binnenkomen — in plaats van bij elk nieuwsbericht de volledige inschatting overnieuw te doen.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Een veelgemaakte fout is het negeren van de prior en enkel reageren op het laatste nieuwsbericht ("recency bias"). Bayesiaans redeneren dwingt discipline af: nieuw bewijs moet worden afgewogen tegen de basisinschatting, niet die volledig vervangen.</div>
  </section>

  <section class="block">
    <h3>Eenvoudig toepassingsvoorbeeld <span class="tag">framework</span></h3>
    <table class="datatab">
      <tr><th>Stap</th><th>Voorbeeld</th></tr>
      <tr><td>Prior</td><td>Basisinschatting: 5% kans op grootschalige escalatie dit jaar, gebaseerd op historische basisfrequentie</td></tr>
      <tr><td>Nieuw bewijs</td><td>Ongebruikelijke troepenconcentratie gerapporteerd door OSINT-bronnen</td></tr>
      <tr><td>Likelihood-inschatting</td><td>Hoe waarschijnlijk is dit bewijs, gegeven escalatie versus gegeven status quo?</td></tr>
      <tr><td>Posterior</td><td>Bijgewerkte kans, bijvoorbeeld gestegen naar 12%, met vastgelegde onderbouwing</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>Systematische logging van priors en updates per scenario (audit trail).</li>
      <li>Forecasting-platformen met Bayesiaanse aggregatie (bijv. Metaculus, Good Judgment Project).</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">Philip Tetlock — Superforecasting</span>
      <span class="source-chip">Good Judgment Project — gjopen.com</span>
      <span class="source-chip">Metaculus — metaculus.com</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz33',[
      {q:'Wat is een posterior in Bayesiaanse risico-inschatting?', opts:['De aanvankelijke waarschijnlijkheidsinschatting voor nieuw bewijs','De bijgewerkte waarschijnlijkheid na verwerking van nieuw bewijs','Een vast historisch gemiddelde dat nooit verandert','Een term uit de scheepvaartlogistiek'], correct:1},
      {q:'Wat is recency bias in deze context?', opts:['Het correct afwegen van nieuw bewijs tegen een basisinschatting','Enkel reageren op het laatste nieuwsbericht zonder de prior mee te wegen','Het negeren van alle nieuwe informatie','Een voorkeur voor oudere data boven nieuwe data'], correct:1},
      {q:'Waarom past Bayesiaans denken natuurlijk bij geopolitieke analyse?', opts:['Omdat het toelaat waarschijnlijkheden systematisch bij te werken naarmate nieuwe signalen binnenkomen','Omdat het garandeert dat voorspellingen altijd exact uitkomen','Omdat het geen enkele data vereist','Omdat het enkel voor natuurkunde is ontworpen'], correct:0},
    ])}
  </section>
  `;
}

      {q:'Wat is het doel van scenario-impacttesten in portefeuilleconstructie?', opts:['Enkel historische rendementen herhalen','Simuleren hoe de portefeuille zou presteren onder elk hoofdscenario uit de scenarioanalyse','Belastingaangiftes automatiseren','Het aantal aandelen in de portefeuille tellen'], correct:1},

function renderModule35(){

  <h1 class="module-title">Stress testing voor geopolitieke schokken</h1>

  <section class="block">
    <h3>Wat is een geopolitieke stresstest <span class="tag">theorie</span></h3>
    <p>Een stresstest simuleert hoe een instelling (bank, verzekeraar, pensioenfonds) zou presteren onder een extreem maar plausibel scenario. Sinds 2022 hebben Europese toezichthouders (ECB, EBA) geopolitieke scenario's expliciet opgenomen naast klassieke macro-economische stresstests — bijvoorbeeld een scenario van energie-embargo's, aanhoudende hoge grondstofprijzen en verstoorde toeleveringsketens gecombineerd met renteschokken.</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Stresstests zijn geen voorspellingen — het scenario hoeft niet de meest waarschijnlijke uitkomst te zijn. Het doel is aantonen dat een instelling voldoende kapitaalbuffers heeft om een extreem scenario te overleven, zelfs als de kans daarop laag wordt ingeschat.</div>
  </section>

function renderModule37(){

  <div class="eyebrow">Module 37 · Expert</div>

  ${renderDashStrip([

    {label:'R2P-doctrine aanvaard', value:'2005', delta:'VN Wereldtop — maar zonder bindend rechtsinstrument', dir:''},

  <section class="block">
    <h3>Staatssoevereiniteit versus humanitair ingrijpen <span class="tag">theorie</span></h3>
    <p>Het moderne internationale systeem is gebouwd op het <b>Westfaalse principe</b> (1648): staten zijn soeverein binnen hun eigen grenzen en andere staten mogen zich niet met hun binnenlandse aangelegenheden bemoeien. Het VN-Handvest (1945) codificeerde dit in Artikel 2(4). Maar wat als een staat zijn eigen bevolking massamoord of genocide laat ondergaan? Deze spanning leidde tot de ontwikkeling van de doctrine van de <b>Responsibility to Protect</b> (R2P).</p>
  </section>

  <section class="block">
    <h3>De drie pijlers van R2P <span class="tag">framework</span></h3>
    <div class="steps">
      <div class="step"><div class="step-num">01</div><div class="step-body"><b>Pijler 1: Staatsverantwoordelijkheid</b><span>Elke staat heeft de primaire verantwoordelijkheid zijn bevolking te beschermen tegen genocide, oorlogsmisdaden, etnische zuivering en misdaden tegen de menselijkheid.</span></div></div>
      <div class="step"><div class="step-num">02</div><div class="step-body"><b>Pijler 2: Internationale steun</b><span>De internationale gemeenschap helpt staten hun capaciteiten te versterken om aan deze verantwoordelijkheid te voldoen.</span></div></div>
      <div class="step"><div class="step-num">03</div><div class="step-body"><b>Pijler 3: Interventie</b><span>Wanneer een staat manifest faalt zijn bevolking te beschermen, heeft de internationale gemeenschap de verantwoordelijkheid tijdig en beslissend op te treden — inclusief via de VN-Veiligheidsraad.</span></div></div>
    </div>

  </section>

function renderModule38(){
  return `
  <div class="eyebrow">Module 38 · Expert</div>
  <h1 class="module-title">Propaganda, desinformatie en soft power</h1>
  <p class="module-dek">Hoe staten en niet-statelijke actoren informatie als wapen inzetten — en hoe analisten propaganda van legitieme communicatie onderscheiden.</p>

  ${renderDashStrip([
    {label:'Soft power (Joseph Nye)', value:'aantrekking, niet dwang', delta:'imago, cultuur, instituties', dir:''},
    {label:'RT/Sputnik EU-verbod', value:'2022', delta:'na Oekraïne-invasie', dir:'down'},
    {label:'Desinformatiecampagnes', value:'sterk gestegen 2016-2024', delta:'Europese verkiezingen, COVID, Oekraïne', dir:'down'},
  ])}

  <section class="block">
    <h3>Hard power versus soft power versus sharp power <span class="tag">theorie</span></h3>
    <p>Joseph Nye introduceerde in 1990 het concept <b>soft power</b>: de capaciteit van een staat om anderen te beïnvloeden via aantrekkingskracht in plaats van dwang of betaling. Cultuur, politieke waarden en buitenlands beleid zijn de drie bronnen. <b>Sharp power</b> (Walker & Ludwig, 2017) beschrijft een tussenweg waarbij autoritaire staten informatiemacht inzetten om democratische processen te manipuleren — niet open soft power, maar gerichte desinformatie en informatiemanipulatie.</p>
    <table class="datatab">
      <tr><th>Concept</th><th>Mechanisme</th><th>Voorbeeld</th></tr>
      <tr><td>Hard power</td><td>Militaire en economische dwang</td><td>Sancties, militaire interventie</td></tr>
      <tr><td>Soft power</td><td>Aantrekking via cultuur, waarden, instituties</td><td>Hollywood, EU-lidmaatschapsaantrekkelijkheid</td></tr>
      <tr><td>Smart power</td><td>Combinatie van hard en soft</td><td>VS-buitenlands beleid-doctrine</td></tr>
      <tr><td>Sharp power</td><td>Manipulatie van informatieomgeving</td><td>Russische troll farms, Chinese mediabeïnvloeding</td></tr>
    </table>
  </section>

  <section class="block">
    <h3>Desinformatie als instrument van staatsstrategie <span class="tag">casestudy</span></h3>
    <p>Rusland's gebruik van desinformatie is goed gedocumenteerd: van de operaties rond de annexatie van de Krim (2014), waarbij twijfel werd gezaaid over feiten, tot grootschalige sociale-mediacampagnes tijdens westerse verkiezingen (2016–2020). Kerntechnieken: <b>fabricatie</b> (nep-content), <b>amplificatie</b> (bots die echte of neppe berichten versterken), <b>manipulatie van context</b> (echte beelden in verkeerde context) en <b>zaadloze twijfel</b> (geen definitieve claim, maar permanente onzekerheid creëren).</p>
    <div class="callout warn"><div class="callout-label">Veelgemaakte denkfout</div>Desinformatie hoeft niet geloofwaardig te zijn. Zelfs als mensen individuele claims niet geloven, ondermijnt blootstelling aan constante conflicterende informatie het vertrouwen in feitelijke instituties in het algemeen — dit is het doel.</div>
  </section>

  <section class="block">
    <h3>Indicatoren om te volgen <span class="tag">actionable</span></h3>
    <ul>
      <li>EU DisinfoLab en EUvsDisinfo-database (euvsdisinfo.eu).</li>
      <li>Stanford Internet Observatory en DFRLab (Digital Forensic Research Lab).</li>
      <li>Landscore in Soft Power 30-index (Portland/USC).</li>
      <li>Press Freedom Index (RSF) als indicator van informatieomgeving per land.</li>
    </ul>
  </section>

  <section class="block">
    <h3>Data & bronnen</h3>
    <div class="sources">
      <span class="source-chip">EUvsDisinfo — euvsdisinfo.eu</span>
      <span class="source-chip">DFRLab — digitalsherlocks.org</span>
      <span class="source-chip">Soft Power 30 — softpower30.com</span>
      <span class="source-chip">RSF Press Freedom Index</span>
    </div>
  </section>

  <section class="block">
    <h3>Kennistoets</h3>
    ${quiz('quiz38',[
      {q:'Wat onderscheidt "sharp power" van "soft power"?', opts:['Sharp power is altijd militair van aard','Sharp power verwijst naar gerichte informatiemanipulatie en desinformatie, niet open aantrekking','Sharp power en soft power zijn synoniemen','Soft power omvat sancties en sharp power niet'], correct:1},
      {q:'Wat is het doel van het constante aanbod van conflicterende informatie via desinformatiecampagnes?', opts:['Het overtuigen van iedereen van een specifieke mening','Het ondermijnen van vertrouwen in feitelijke instituties in het algemeen','Het verbeteren van het publieke debat','Het versterken van democratische waarden'], correct:1},
      {q:'Welke kerntechniek van desinformatie plaatst echte beelden in een verkeerde context?', opts:['Fabricatie','Amplificatie','Contextuele manipulatie','Zaadloze twijfel'], correct:2},
    ])}
  </section>
  `;
}

function renderModule42(){
  return `
  <div class="eyebrow">Module 42 · Case Study</div>
  <h1 class="module-title">Case Study: BRICS-uitbreiding en de nieuwe wereldorde</h1>
  <p class="module-dek">Van een Goldman Sachs-acroniem naar een geopolitiek blok: hoe BRICS+, de-dollarisatie-ambities en Zuidelijke solidariteit de liberale wereldorde uitdagen.</p>

  ${renderDashStrip([
    {label:'BRICS+ leden (2024)', value:'10', delta:'Brazilië, Rusland, India, China, ZA, EAE, Iran, Egypte, Ethiopië, Saoedi-Arabië', dir:''},
    {label:'BRICS+ aandeel wereld-BBP (PPP)', value:'>35%', delta:'vs G7 ±45%', dir:'up'},
    {label:'De-dollarisatie-inspanningen', value:'groeiend', delta:'bilaterale handel in lokale valuta', dir:'down'},
  ])}

  <section class="block">
    <h3>Van acroniem naar geopolitiek blok <span class="tag">historische achtergrond</span></h3>
    <p>De term BRIC werd in 2001 bedacht door Goldman Sachs-econoom Jim O'Neill om de vier snelst groeiende opkomende economieën te omschrijven. Uit analytisch acroniem groeide een geopolitiek samenwerkingsverband: de BRICS-landen begonnen jaarlijkse top-bijeenkomsten te houden (2009) en hebben nu een gezamenlijke institutionele structuur, inclusief de New Development Bank (NDB) als alternatief voor het IMF en de Wereldbank. In 2024 werden vijf nieuwe landen uitgenodigd toe te treden, waardoor BRICS+ het meest bevolkte en meest diverse geopolitieke initiatief buiten de VN vertegenwoordigt.</p>
  </section>

  <section class="block">
    <h3>De-dollarisatie: retoriek versus realiteit <span class="tag">theorie</span></h3>
    <p>Een centrale ambitie binnen BRICS is de reductie van dollarafhankelijkheid in internationale handel en financiën. Rusland en China moedigen bilaterale handel in roebel en yuan aan; BRICS bespreekt een gemeenschappelijke valuta. De realiteit is nuchterder: de dollar domineert nog altijd 88% van het internationale betalingsverkeer, en geen enkele munt heeft de diepte, liquiditeit en vertrouwen van de dollar om hem op korte termijn te vervangen. Maar de richting is duidelijk: de intentie om alternatieve structuren op te bouwen is politiek reëel.</p>
    <div class="callout warn"><div class="callout-label">Nuance</div>De-dollarisatie is een gradueel en langjarig proces, geen plotselinge systeembreuk. Zelfs als BRICS landen meer in lokale valuta afrekenen, blijft de dollar het mondiale reservevalutasysteem voor decennia dominant. Analisten overschatten systematisch de korte-termijnsnelheid van dit proces.</div>
  </section>

  <section class="block">
    <h3>BRICS vs G7: economisch gewicht <span class="tag">casestudy</span></h3>
    <div class="chart-wrap">
      <div class="chart-title">BRICS vs G7: aandeel wereld-BBP (koopkrachtpariteit), %</div>
      <div class="chart-sub">Bron: IMF World Economic Outlook · benaderend</div>
      <canvas id="chartBRICS"></canvas>
    </div>
    <div class="case-card">
      <div class="case-head"><span class="case-title">Kantelpunt: BRICS overtreft G7 in koopkrachtpariteit</span><span class="case-date">±2023</span></div>
      <p>Gemeten naar PPP overtrof het gecombineerde economische gewicht van de BRICS-landen dat van de G7 al voor het midden van de jaren 2020. Dit is deels een statistische kwestie (PPP versus marktprijzen), maar illustreert het verschuivende economische zwaartepunt richting het Zuiden en Oosten. Geen enkel groot land wil meer automatisch de westerse institutionele orde accepteren als de enige legitieme wereldorde.</p>
    </div>
  </section>

  <section class="block">
    <h3>Lessen voor analisten <span class="tag">actionable</span></h3>
    <ul>
      <li>BRICS is geen coherente militaire alliantie maar een coalitie van belangen — niet alles wat westerse landen doet, doen BRICS-leden samen.</li>
      <li>India en China zijn BRICS-leden met diepe onderlinge rivaliteit (grensconflicten, economische concurrentie).</li>
      <li>Monitor de New Development Bank als alternatief financieringsmechanisme voor ontwikkelingsprojecten buiten IMF/Wereldbank-condities.</li>
      <li>De-dollarisatie-retoriek kan marktvolatiliteit veroorzaken maar heeft tot op heden beperkte concrete structurele impact op dollarhegemonie.</li>

  else if(n===42) html = renderModule42();
  else html = renderStub(n);

  const idx = MODULE_LIST.findIndex(m=>m.n===n);
  const prev = MODULE_LIST[idx-1];
  const next = MODULE_LIST[idx+1];
  html += `<div class="nav-footer">
    ${prev? `<div class="nav-btn" onclick="goTo(${prev.n})"><div class="lbl">Vorige</div><div class="ttl">${String(prev.n).padStart(2,'0')} · ${prev.title}</div></div>`:'<div></div>'}
    ${next? `<div class="nav-btn right" onclick="goTo(${next.n})"><div class="lbl">Volgende</div><div class="ttl">${String(next.n).padStart(2,'0')} · ${next.title}</div></div>`:''}
  </div>`;

  content.innerHTML = html;
  document.getElementById('crumb').innerHTML = crumbFor(n);
  const builtCount = Object.keys(BUILT).length;
  document.getElementById('progressPill').textContent = `${builtCount} / ${MODULE_LIST.length} modules uitgewerkt`;

  // Module-specific charts
  if(n===1)  makeLineChart('chartConflict1', GLOBAL_CONFLICT, {color:'#B23B3B', suffix:''});
  if(n===3)  makeLineChart('chartOorlog3', GLOBAL_CONFLICT, {color:'#B23B3B', suffix:''});
  if(n===5)  makeLineChart('chartBrent5', BRENT_OIL, {color:'#9C7A2A', suffix:' $'});
  if(n===5)  makeLineChart('chartTTF5', TTF_GAS, {color:'#1B3A5C', suffix:'€'});
  if(n===7)  makeLineChart('chartBDI7', BALTIC_DRY, {color:'#1B3A5C', suffix:''});
  if(n===8)  makeLineChart('chartNATO8', NATO_SPENDING, {color:'#1B3A5C', suffix:'%'});
  if(n===14) makeBarChart('chartBRICS14', {labels:['1992','2000','2010','2020','2024','2030p'],values:[24,26,30,35,37,40]}, {color:'#9C7A2A', suffix:'%'});
  if(n===15) makeLineChart('chartSemi15', SEMICONDUCTOR_INVESTMENT, {color:'#1B3A5C', suffix:'B$'});
  if(n===18) makeLineChart('chartDollar18', USD_RESERVE_SHARE, {color:'#9C7A2A', suffix:'%'});
  if(n===24) makeBarChart('chartDefence24', DEFENCE_SPENDING_WORLD, {color:'#B23B3B', suffix:'T$'});
  if(n===25) makeLineChart('chartChip25', SEMICONDUCTOR_INVESTMENT, {color:'#1B3A5C', suffix:'B$'});
  if(n===26) makeLineChart('chartBrent26', BRENT_OIL, {color:'#9C7A2A', suffix:' $'});
  if(n===39) makeLineChart('chartTTFOekraine', TTF_GAS, {color:'#B23B3B', suffix:'€'});
  if(n===40) makeLineChart('chartChipTaiwan', SEMICONDUCTOR_INVESTMENT, {color:'#1B3A5C', suffix:'B$'});
  if(n===41) makeLineChart('chartSuezTransit', SUEZ_TRANSITS, {color:'#9C7A2A', suffix:''});
  if(n===42) makeBarChart('chartBRICS', BRICS_GDP_SHARE, {color:'#1B3A5C', suffix:'%'});

  document.getElementById('sidebar').classList.toggle('open', state.sidebarOpen);
  window.scrollTo(0,0);
}

function goTo(n){ state.current = n; render(); }
window.goTo = goTo;

document.getElementById('menuBtn').onclick = ()=>{ state.sidebarOpen = !state.sidebarOpen; document.getElementById('sidebar').classList.toggle('open', state.sidebarOpen); };

render();
</script>
</body>
</html>
